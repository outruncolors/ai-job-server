<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice · AI Job Server</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: monospace; background: #111; color: #ccc; overflow: hidden; }

    /* ── Forms ── */
    label { display: block; color: #777; font-size: 0.76rem; margin-bottom: 3px; margin-top: 10px; }
    input, textarea, select {
      width: 100%; padding: 6px 8px; background: #181818; border: 1px solid #2e2e2e;
      color: #ccc; font-family: monospace; font-size: 0.82rem; border-radius: 3px;
    }
    input:focus, textarea:focus, select:focus { outline: none; border-color: #4a4a4a; }
    textarea { resize: vertical; min-height: 54px; }
    button {
      padding: 7px 18px; background: #2a6; color: #fff; border: none;
      border-radius: 3px; cursor: pointer; font-family: monospace; font-size: 0.82rem; margin-top: 10px;
    }
    button:hover { background: #3b7; }
    button.secondary { background: #333; }
    button.secondary:hover { background: #424242; }
    button.danger { background: #7a2222; }
    button.danger:hover { background: #992828; }
    button[disabled] { opacity: 0.38; cursor: not-allowed; background: #2a2a2a; }
    input[type=range] { width: 100%; accent-color: #2a6; padding: 0; background: none; border: none; }
    .row { display: flex; gap: 10px; }
    .row > * { flex: 1; min-width: 0; }
    .msg { font-size: 0.76rem; min-height: 1.1em; margin-top: 6px; }
    .status-queued  { color: #777; }
    .status-running { color: #fa0; }
    .status-done    { color: #2a6; }
    .status-failed, .status-error { color: #e44; }
    details > summary { cursor: pointer; color: #555; font-size: 0.76rem; user-select: none; list-style: none; }
    details > summary::-webkit-details-marker { display: none; }
    details > summary::before { content: '▸ '; }
    details[open] > summary::before { content: '▾ '; }
    fieldset { border: 1px solid #252525; border-radius: 3px; padding: 10px 12px; margin-top: 8px; }
    legend { color: #555; font-size: 0.73rem; padding: 0 4px; }
    .btn-wrap { position: relative; display: inline-block; margin-top: 10px; }
    .btn-tip {
      display: none; position: absolute; bottom: calc(100% + 4px); left: 50%;
      transform: translateX(-50%); background: #222; color: #aaa;
      font-size: 0.7rem; padding: 3px 7px; border-radius: 3px;
      white-space: nowrap; pointer-events: none; border: 1px solid #383838;
    }
    .btn-wrap:hover button[disabled] + .btn-tip { display: block; }

    /* ── Nav ── */
    #topnav {
      position: fixed; top: 0; left: 0; right: 0; height: 44px;
      display: flex; align-items: center; padding: 0 20px; gap: 20px;
      background: #111; border-bottom: 1px solid #1a1a1a; z-index: 100;
    }
    #topnav a {
      color: #444; text-decoration: none; font-size: 0.72rem;
      letter-spacing: 0.06em; transition: color 0.15s;
    }
    #topnav a:hover { color: #888; }
    #topnav .nav-home { color: #2a6; font-weight: 700; letter-spacing: 0.02em; }
    #topnav a.active { color: #ccc; }

    /* ── Panels ── */
    #panels { display: flex; height: 100vh; padding-top: 44px; }
    #panel-left  { flex: 1; overflow-y: auto; padding: 24px 28px; border-right: 1px solid #1a1a1a; }
    #panel-right { flex: 1; overflow-y: auto; padding: 24px 28px; }


    /* ── OmniVoice-specific ── */
    .ov-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
    .ov-running { background: #2a6; }
    .ov-stopped { background: #3a3a3a; }
    .ov-error   { background: #e44; }

    #ov-status-bar {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      font-size: 0.74rem; padding-bottom: 12px; margin-bottom: 16px;
      border-bottom: 1px solid #1e1e1e;
    }
    #ov-status-bar button { margin-top: 0; padding: 4px 10px; font-size: 0.7rem; }
    #ov-status-bar select { width: auto; font-size: 0.7rem; padding: 3px 6px; }
    #ov-ctrl-msg { font-size: 0.74rem; min-height: 1.1em; }

    #ov-audio { margin-top: 14px; width: 100%; display: none; }
    #ov-save-design-wrap { display: none; }

    .voice-mode-head {
      display: flex; align-items: center; gap: 8px; cursor: pointer;
      padding: 6px 0; border-bottom: 1px solid #1e1e1e; margin-bottom: 4px;
    }
    .voice-mode-head input[type=radio] { width: auto; margin: 0; accent-color: #2a6; cursor: pointer; }
    .voice-mode-head label { display: inline; margin: 0; cursor: pointer; font-size: 0.76rem; color: #666; }
    .section-label { color: #383838; font-size: 0.66rem; letter-spacing: 0.12em; text-transform: uppercase; }
  </style>
</head>
<body>

  <nav id="topnav">
    <a href="/" class="nav-home">AI Jobs</a>
    <a href="/chain" data-page="chain">Chain</a>
    <a href="/context/" data-page="context">Context</a>
    <a href="/voice" data-page="voice">Voice</a>
    <a href="/image" data-page="image">Image</a>
    <a href="/jobs" data-page="jobs">Jobs</a>
  </nav>

  <div id="panels">

    <!-- ── Left: Controls ── -->
    <div id="panel-left">

      <!-- Server status bar -->
      <div id="ov-status-bar">
        <span>
          <span id="ov-proc-dot" class="ov-dot ov-stopped"></span>
          <strong id="ov-proc-state" style="color:#666;">-</strong>
        </span>
        <span style="color:#444;">Mode: <strong id="ov-mode" style="color:#555;">-</strong></span>
        <span style="color:#444;">Health: <strong id="ov-health" style="color:#555;">-</strong></span>
        <span style="color:#444;">Active: <strong id="ov-active" style="color:#555;">0</strong></span>
        <button onclick="ovAction('start')">Start</button>
        <button class="secondary" onclick="ovAction('stop')">Stop</button>
        <button class="secondary" onclick="ovAction('restart')">Restart</button>
        <select id="ov-mode-select">
          <option value="ephemeral">ephemeral</option>
          <option value="persistent">persistent</option>
        </select>
        <button class="secondary" onclick="saveOvConfig()">Save</button>
        <div id="ov-ctrl-msg" style="flex:1;"></div>
      </div>

      <!-- Text + params -->
      <label>Text</label>
      <textarea id="ov-text" style="min-height:120px;" placeholder="Hello from OmniVoice!"></textarea>

      <div class="row">
        <div>
          <label>Language</label>
          <input id="ov-lang" type="text" list="ov-lang-list" placeholder="Auto">
          <datalist id="ov-lang-list">
            <option value="Auto"><option value="English"><option value="Chinese">
            <option value="Spanish"><option value="French"><option value="German">
            <option value="Japanese"><option value="Korean"><option value="Portuguese">
            <option value="Russian"><option value="Italian"><option value="Dutch">
            <option value="Arabic"><option value="Hindi"><option value="Turkish">
            <option value="Polish"><option value="Swedish"><option value="Vietnamese">
            <option value="Thai"><option value="Indonesian"><option value="Ukrainian">
            <option value="Greek"><option value="Hebrew"><option value="Persian">
          </datalist>
        </div>
        <div>
          <label>Speed</label>
          <input id="ov-spd" type="number" step="0.05" min="0.5" max="1.5" value="1.0">
        </div>
      </div>

      <!-- Voice mode: Clone -->
      <div style="margin-top:18px;">
        <details id="ov-clone-details">
          <summary>
            <span class="voice-mode-head">
              <input type="radio" name="ov-voice-mode" value="clone" id="ov-clone-radio">
              <label for="ov-clone-radio">Voice Clone</label>
            </span>
          </summary>
          <fieldset style="margin-top:8px;">
            <legend>Add Preset</legend>
            <label>Sample (.wav)</label>
            <input type="file" id="ov-preset-file" accept=".wav" onchange="ovUpdateSavePresetBtn()" style="padding:3px 0;">
            <label>Name</label>
            <input type="text" id="ov-preset-name" placeholder="e.g. Alice" oninput="ovUpdateSavePresetBtn()">
            <label>Caption</label>
            <textarea id="ov-preset-caption" style="min-height:40px;"
                      placeholder="Exact words spoken in the sample…" oninput="ovUpdateSavePresetBtn()"></textarea>
            <div class="btn-wrap">
              <button id="ov-preset-save-btn" onclick="ovSavePreset()" disabled>Save Preset</button>
              <span class="btn-tip">Fill in sample, name, and caption first</span>
            </div>
            <div id="ov-preset-save-msg" class="msg"></div>
          </fieldset>
          <div style="margin-top:10px;">
            <label>Active Preset</label>
            <select id="ov-preset-select"><option value="">— none —</option></select>
            <div id="ov-preset-empty-msg" style="display:none;color:#444;font-size:0.74rem;margin-top:4px;">No presets yet.</div>
          </div>
          <div style="margin-top:8px;">
            <label>Remove Preset</label>
            <select id="ov-preset-remove-select"><option value="">— select to remove —</option></select>
          </div>
          <div id="ov-clone-msg" class="msg"></div>
        </details>
      </div>

      <!-- Voice mode: Design -->
      <div style="margin-top:8px;">
        <details id="ov-design-details" open>
          <summary>
            <span class="voice-mode-head">
              <input type="radio" name="ov-voice-mode" value="design" id="ov-design-radio" checked>
              <label for="ov-design-radio">Voice Design</label>
            </span>
          </summary>
          <div style="margin-top:10px;">
            <div class="row">
              <div>
                <label>Gender</label>
                <select id="ov-gender">
                  <option value="Auto">Auto</option>
                  <option value="Male / 男">Male</option>
                  <option value="Female / 女">Female</option>
                </select>
              </div>
              <div>
                <label>Age</label>
                <select id="ov-age">
                  <option value="Auto">Auto</option>
                  <option value="Child / 儿童">Child</option>
                  <option value="Teenager / 少年">Teenager</option>
                  <option value="Young Adult / 青年">Young Adult</option>
                  <option value="Middle-aged / 中年">Middle-aged</option>
                  <option value="Elderly / 老年">Elderly</option>
                </select>
              </div>
            </div>
            <div class="row">
              <div>
                <label>Pitch</label>
                <select id="ov-pitch">
                  <option value="Auto">Auto</option>
                  <option value="Very Low Pitch / 极低音调">Very Low</option>
                  <option value="Low Pitch / 低音调">Low</option>
                  <option value="Moderate Pitch / 中音调">Moderate</option>
                  <option value="High Pitch / 高音调">High</option>
                  <option value="Very High Pitch / 极高音调">Very High</option>
                </select>
              </div>
              <div>
                <label>Style</label>
                <select id="ov-style">
                  <option value="Auto">Auto</option>
                  <option value="Whisper / 耳语">Whisper</option>
                </select>
              </div>
            </div>
            <div class="row">
              <div>
                <label>EN Accent</label>
                <select id="ov-accent">
                  <option value="Auto">Auto</option>
                  <option value="American Accent / 美式口音">American</option>
                  <option value="Australian Accent / 澳大利亚口音">Australian</option>
                  <option value="British Accent / 英国口音">British</option>
                  <option value="Canadian Accent / 加拿大口音">Canadian</option>
                  <option value="Chinese Accent / 中国口音">Chinese</option>
                  <option value="Indian Accent / 印度口音">Indian</option>
                  <option value="Japanese Accent / 日本口音">Japanese</option>
                  <option value="Korean Accent / 韩国口音">Korean</option>
                  <option value="Portuguese Accent / 葡萄牙口音">Portuguese</option>
                  <option value="Russian Accent / 俄罗斯口音">Russian</option>
                </select>
              </div>
              <div>
                <label>ZH Dialect</label>
                <select id="ov-dialect">
                  <option value="Auto">Auto</option>
                  <option value="Northeast Dialect / 东北话">Northeast</option>
                  <option value="Sichuan Dialect / 四川话">Sichuan</option>
                  <option value="Henan Dialect / 河南话">Henan</option>
                  <option value="Shaanxi Dialect / 陕西话">Shaanxi</option>
                  <option value="Guizhou Dialect / 贵州话">Guizhou</option>
                  <option value="Yunnan Dialect / 云南话">Yunnan</option>
                  <option value="Guilin Dialect / 桂林话">Guilin</option>
                  <option value="Jinan Dialect / 济南话">Jinan</option>
                  <option value="Shijiazhuang Dialect / 石家庄话">Shijiazhuang</option>
                  <option value="Gansu Dialect / 甘肃话">Gansu</option>
                  <option value="Ningxia Dialect / 宁夏话">Ningxia</option>
                  <option value="Qingdao Dialect / 青岛话">Qingdao</option>
                </select>
              </div>
            </div>
          </div>
        </details>
      </div>

      <!-- Generation settings -->
      <details style="margin-top:10px;">
        <summary>Generation Settings</summary>
        <div style="margin-top:10px;">
          <label>
            Inference Steps: <strong id="ov-steps-val">32</strong>
            <span style="color:#383838;font-size:0.7rem;"> (4–64)</span>
          </label>
          <input id="ov-steps" type="range" min="4" max="64" step="1" value="32"
                 oninput="document.getElementById('ov-steps-val').textContent=this.value"
                 style="margin-top:4px;">
          <label style="margin-top:10px;">
            Guidance Scale: <strong id="ov-cfg-val">2.0</strong>
            <span style="color:#383838;font-size:0.7rem;"> (0–4)</span>
          </label>
          <input id="ov-cfg" type="range" min="0" max="4" step="0.1" value="2.0"
                 oninput="document.getElementById('ov-cfg-val').textContent=parseFloat(this.value).toFixed(1)"
                 style="margin-top:4px;">
        </div>
      </details>

      <button onclick="ovSubmitVoice()" style="margin-top:20px;">Synthesize</button>
    </div>

    <!-- ── Right: Output ── -->
    <div id="panel-right">
      <p class="section-label" style="margin-bottom:14px;">OUTPUT</p>
      <div id="ov-job-msg" class="msg" style="margin-top:0;"></div>
      <audio id="ov-audio" controls></audio>

      <fieldset id="ov-save-design-wrap" style="margin-top:20px;">
        <legend>Save as preset</legend>
        <label>Name</label>
        <input type="text" id="ov-save-design-name" placeholder="e.g. Warm Narrator"
               oninput="ovUpdateSaveDesignBtn()">
        <div class="btn-wrap">
          <button id="ov-save-design-btn" onclick="ovSaveFromDesign()" disabled>Save Voice</button>
          <span class="btn-tip">Enter a name first</span>
        </div>
        <div id="ov-save-design-msg" class="msg"></div>
      </fieldset>

      <div id="voice-right-hint" style="color:#222;font-size:0.74rem;margin-top:8px;">
        Synthesize to hear output here.
      </div>
    </div>

  </div>

  <script>
    async function api(path, method = 'GET', body = null) {
      const opts = { method, headers: { 'Content-Type': 'application/json' } };
      if (body) opts.body = JSON.stringify(body);
      const r = await fetch('/v1' + path, opts);
      if (!r.ok) throw new Error(await r.text());
      return r.json();
    }
    function _escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function statusClass(s) { return 'status-' + s; }

    // ── Voice presets ────────────────────────────────────────────────
    let _ovPresets      = [];
    let _ovCurrentJobId = null;
    let _ovJobPollTimer = null;

    async function ovLoadPresets() {
      try {
        const r = await fetch('/v1/voice-presets');
        if (!r.ok) throw new Error(await r.text());
        _ovPresets = await r.json();
      } catch (e) { _ovPresets = []; }
      _ovRenderPresetSelects();
    }
    function _ovRenderPresetSelects() {
      const sel = document.getElementById('ov-preset-select');
      const rem = document.getElementById('ov-preset-remove-select');
      const emptyMsg = document.getElementById('ov-preset-empty-msg');
      const currentVal = sel.value;
      const opts = _ovPresets.map(p => `<option value="${p.id}">${_escHtml(p.name)}</option>`).join('');
      sel.innerHTML = '<option value="">— none —</option>' + opts;
      rem.innerHTML = '<option value="">— select to remove —</option>' + opts;
      if (_ovPresets.some(p => p.id === currentVal)) sel.value = currentVal;
      emptyMsg.style.display = _ovPresets.length === 0 ? 'block' : 'none';
    }
    function ovUpdateSavePresetBtn() {
      const hasFile    = document.getElementById('ov-preset-file').files.length > 0;
      const hasName    = document.getElementById('ov-preset-name').value.trim() !== '';
      const hasCaption = document.getElementById('ov-preset-caption').value.trim() !== '';
      document.getElementById('ov-preset-save-btn').disabled = !(hasFile && hasName && hasCaption);
    }
    async function ovSavePreset() {
      const msg    = document.getElementById('ov-preset-save-msg');
      const fileEl = document.getElementById('ov-preset-file');
      const nameEl = document.getElementById('ov-preset-name');
      const captEl = document.getElementById('ov-preset-caption');
      msg.textContent = '';
      const fd = new FormData();
      fd.append('file', fileEl.files[0]);
      fd.append('name', nameEl.value.trim());
      fd.append('caption', captEl.value.trim());
      try {
        const r = await fetch('/v1/voice-presets', { method: 'POST', body: fd });
        if (!r.ok) throw new Error(await r.text());
        const preset = await r.json();
        msg.style.color = '#2a6'; msg.textContent = `Saved "${preset.name}"`;
        fileEl.value = ''; nameEl.value = ''; captEl.value = '';
        ovUpdateSavePresetBtn();
        await ovLoadPresets();
        _ovSetMode('clone');
        document.getElementById('ov-preset-select').value = preset.id;
      } catch (e) {
        msg.style.color = '#e44'; msg.textContent = 'Error: ' + e.message;
      }
    }
    function ovUpdateSaveDesignBtn() {
      const hasName = document.getElementById('ov-save-design-name').value.trim() !== '';
      document.getElementById('ov-save-design-btn').disabled = !hasName;
    }
    async function ovSaveFromDesign() {
      if (!_ovCurrentJobId) return;
      const msg    = document.getElementById('ov-save-design-msg');
      const nameEl = document.getElementById('ov-save-design-name');
      const name   = nameEl.value.trim();
      if (!name) return;
      const caption = document.getElementById('ov-text').value.trim();
      msg.style.color = '#fa0'; msg.textContent = 'Saving…';
      try {
        const r = await fetch('/v1/voice-presets/from-job', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ job_id: _ovCurrentJobId, name, caption }),
        });
        if (!r.ok) throw new Error(await r.text());
        const preset = await r.json();
        msg.style.color = '#2a6'; msg.textContent = `Saved as "${preset.name}"`;
        await ovLoadPresets();
        _ovSetMode('clone');
        document.getElementById('ov-preset-select').value = preset.id;
        document.getElementById('ov-save-design-wrap').style.display = 'none';
      } catch (e) {
        msg.style.color = '#e44'; msg.textContent = 'Error: ' + e.message;
      }
    }

    // ── OmniVoice control ────────────────────────────────────────────
    function _ovSetMode(which) {
      const isClone = which === 'clone';
      document.getElementById('ov-clone-details').open  = isClone;
      document.getElementById('ov-design-details').open = !isClone;
      document.getElementById('ov-clone-radio').checked  = isClone;
      document.getElementById('ov-design-radio').checked = !isClone;
    }
    function _ovActiveMode() {
      return document.getElementById('ov-clone-radio').checked ? 'clone' : 'design';
    }
    function _ovInitExclusiveDetails() {
      ['clone', 'design'].forEach(mode => {
        document.getElementById(`ov-${mode}-details`)
          .querySelector('summary')
          .addEventListener('click', e => { e.preventDefault(); _ovSetMode(mode); });
        document.getElementById(`ov-${mode}-radio`)
          .addEventListener('change', () => _ovSetMode(mode));
      });
    }
    async function ovFetch(path, method = 'GET', body = null) {
      const opts = { method, headers: { 'Content-Type': 'application/json' } };
      if (body) opts.body = JSON.stringify(body);
      const r = await fetch('/v1/omnivoice' + path, opts);
      if (!r.ok) throw new Error(await r.text());
      return r.json();
    }
    async function loadOvStatus() {
      try {
        const s = await ovFetch('/status');
        document.getElementById('ov-mode').textContent = s.mode;
        document.getElementById('ov-proc-state').textContent = s.persistent.process_state;
        const dot = document.getElementById('ov-proc-dot');
        dot.className = 'ov-dot ' + (s.persistent.process_state === 'running' ? 'ov-running' : 'ov-stopped');
        document.getElementById('ov-health').textContent = s.persistent.health;
        document.getElementById('ov-active').textContent = s.active_voice_jobs;
        document.getElementById('ov-mode-select').value = s.mode;
      } catch (e) {
        document.getElementById('ov-proc-state').textContent = 'unreachable';
      }
    }
    async function ovAction(action) {
      const msg = document.getElementById('ov-ctrl-msg');
      msg.textContent = '';
      try {
        await ovFetch('/' + action, 'POST');
        await loadOvStatus();
        msg.style.color = '#2a6'; msg.textContent = action + ' OK';
      } catch (e) {
        msg.style.color = '#e44'; msg.textContent = 'Error: ' + e.message;
      }
    }
    async function saveOvConfig() {
      const msg  = document.getElementById('ov-ctrl-msg');
      const mode = document.getElementById('ov-mode-select').value;
      try {
        const cfg = await ovFetch('/config');
        cfg.mode = mode;
        await ovFetch('/config', 'PUT', cfg);
        await loadOvStatus();
        msg.style.color = '#2a6'; msg.textContent = 'Config saved.';
      } catch (e) {
        msg.style.color = '#e44'; msg.textContent = 'Error: ' + e.message;
      }
    }
    function _buildInstruct() {
      const ids = ['ov-gender','ov-age','ov-pitch','ov-style','ov-accent','ov-dialect'];
      const parts = [];
      for (const id of ids) {
        const v = document.getElementById(id).value;
        if (!v || v === 'Auto') continue;
        if (v.includes(' / ')) {
          const en = v.split(' / ')[0];
          const zh = v.split(' / ')[1];
          parts.push(en.includes('Dialect') ? zh.trim() : en.trim());
        } else { parts.push(v); }
      }
      return parts.join(', ');
    }
    async function ovSubmitVoice() {
      const msg   = document.getElementById('ov-job-msg');
      const audio = document.getElementById('ov-audio');
      const hint  = document.getElementById('voice-right-hint');
      audio.style.display = 'none';
      document.getElementById('ov-save-design-wrap').style.display = 'none';
      _ovCurrentJobId = null; msg.textContent = '';
      const body = {
        text:           document.getElementById('ov-text').value,
        speed:          parseFloat(document.getElementById('ov-spd').value),
        num_step:       parseInt(document.getElementById('ov-steps').value),
        guidance_scale: parseFloat(document.getElementById('ov-cfg').value),
      };
      const lang = document.getElementById('ov-lang').value.trim();
      if (lang && lang !== 'Auto') body.language = lang;
      if (_ovActiveMode() === 'clone') {
        const presetId = document.getElementById('ov-preset-select').value;
        if (!presetId) {
          msg.style.color = '#e44'; msg.textContent = 'Select a voice preset before synthesizing.'; return;
        }
        body.voice_preset_id = presetId;
      } else {
        const instruct = _buildInstruct();
        if (instruct) body.instruct = instruct;
      }
      try {
        hint.style.display = 'none';
        const job = await api('/jobs/voice', 'POST', body);
        msg.style.color = '#fa0';
        msg.textContent = 'Job ' + job.job_id.slice(0, 8) + '… synthesizing';
        if (_ovJobPollTimer) clearInterval(_ovJobPollTimer);
        _ovJobPollTimer = setInterval(() => _pollOvJob(job.job_id), 3000);
      } catch (e) {
        msg.style.color = '#e44'; msg.textContent = 'Error: ' + e.message;
      }
    }
    async function _pollOvJob(jobId) {
      try {
        const job   = await api('/jobs/' + jobId);
        const msg   = document.getElementById('ov-job-msg');
        const audio = document.getElementById('ov-audio');
        if (job.status === 'done') {
          clearInterval(_ovJobPollTimer); _ovJobPollTimer = null;
          msg.style.color = '#2a6'; msg.textContent = 'Done — playing output.wav';
          _ovCurrentJobId = jobId;
          audio.src = '/v1/jobs/' + jobId + '/files/output.wav';
          audio.style.display = 'block'; audio.load();
        } else if (job.status === 'error') {
          clearInterval(_ovJobPollTimer); _ovJobPollTimer = null;
          msg.style.color = '#e44'; msg.textContent = 'Error: ' + (job.error || 'unknown');
        } else {
          msg.textContent = 'Job ' + jobId.slice(0, 8) + '… ' + job.status;
        }
      } catch (e) {}
    }

    // ── Init ─────────────────────────────────────────────────────────
    document.querySelector('#topnav [data-page="voice"]').classList.add('active');
    setInterval(loadOvStatus, 3000);
    loadOvStatus();
    _ovInitExclusiveDetails();
    ovLoadPresets();

    document.getElementById('ov-audio').addEventListener('loadedmetadata', function() {
      const dur  = this.duration;
      const show = _ovActiveMode() === 'design' && isFinite(dur) && dur >= 3 && dur <= 10;
      const wrap = document.getElementById('ov-save-design-wrap');
      wrap.style.display = show ? 'block' : 'none';
      if (show) {
        document.getElementById('ov-save-design-name').value = '';
        document.getElementById('ov-save-design-msg').textContent = '';
        ovUpdateSaveDesignBtn();
      }
    });

    document.getElementById('ov-preset-remove-select').addEventListener('change', async function() {
      const preset_id = this.value;
      if (!preset_id) return;
      const preset = _ovPresets.find(p => p.id === preset_id);
      const name   = preset ? preset.name : preset_id;
      if (!window.confirm(`Remove voice preset "${name}"? This cannot be undone.`)) {
        this.value = ''; return;
      }
      const msg = document.getElementById('ov-clone-msg');
      try {
        const r = await fetch(`/v1/voice-presets/${preset_id}`, { method: 'DELETE' });
        if (!r.ok) throw new Error(await r.text());
        const activeSel = document.getElementById('ov-preset-select');
        if (activeSel.value === preset_id) activeSel.value = '';
        this.value = '';
        msg.style.color = '#2a6'; msg.textContent = `Removed "${name}"`;
        await ovLoadPresets();
      } catch (e) {
        msg.style.color = '#e44'; msg.textContent = 'Error: ' + e.message;
        this.value = '';
      }
    });
  </script>
</body>
</html>
