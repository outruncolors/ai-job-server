<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>AI Job Server</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; font-family: monospace; background: #111; color: #ccc; }

    #slides-wrap {
      position: fixed; top: 0; left: 0; width: 100%;
      transition: transform 0.62s cubic-bezier(0.77, 0, 0.175, 1);
      will-change: transform;
    }
    .slide {
      height: 100vh; width: 100%; position: relative;
      display: flex; flex-direction: column;
      justify-content: center; padding: 0 72px;
      cursor: pointer; transition: background 0.22s;
    }
    .slide:hover { background: #141414; }
    .slide:hover .slide-arrow { opacity: 1; transform: translateX(6px); }
    .slide + .slide { border-top: 1px solid #1a1a1a; }

    .slide-label { font-size: 3rem; font-weight: 700; color: #2a6; letter-spacing: 0.02em; margin-bottom: 14px; }
    .slide-desc  { font-size: 1.25rem; color: #666; line-height: 1.6; }
    .slide-arrow {
      position: absolute; right: 72px; top: 50%; transform: translateY(-50%);
      font-size: 1.8rem; color: #2a6; opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
    }

    .nav-arr {
      position: fixed; left: 50%; transform: translateX(-50%);
      font-size: 1.3rem; color: #2a2a2a; cursor: pointer; z-index: 50;
      transition: color 0.18s, opacity 0.3s; user-select: none; line-height: 1;
    }
    .nav-arr:hover { color: #555; }
    .nav-arr.hidden { opacity: 0; pointer-events: none; }
    #nav-up   { top: 7px; }
    #nav-down { bottom: 7px; }
  </style>
  <link rel="stylesheet" href="/css/responsive.css">
</head>
<body class="page-home">
  <div id="nav-up"   class="nav-arr hidden" onclick="goToSlide(currentSlide-1)">&#8679;</div>
  <div id="nav-down" class="nav-arr"        onclick="goToSlide(currentSlide+1)">&#8681;</div>

  <div id="slides-wrap">
    <div class="slide" onclick="location.href='/chain'">
      <div class="slide-label">Chain</div>
      <div class="slide-desc">Sequential LLM pipelines.<br>Each step feeds the next.</div>
      <div class="slide-arrow">&#8594;</div>
    </div>
    <div class="slide" onclick="location.href='/context/'">
      <div class="slide-label">Context</div>
      <div class="slide-desc">Manage context documents.<br>Attach them to chain steps.</div>
      <div class="slide-arrow">&#8594;</div>
    </div>
    <div class="slide" onclick="location.href='/voice'">
      <div class="slide-label">Voice</div>
      <div class="slide-desc">Neural speech synthesis.<br>Design or clone a voice.</div>
      <div class="slide-arrow">&#8594;</div>
    </div>
    <div class="slide" onclick="location.href='/image'">
      <div class="slide-label">Image</div>
      <div class="slide-desc">AI image generation.<br>ComfyUI on the local network.</div>
      <div class="slide-arrow">&#8594;</div>
    </div>
    <div class="slide" onclick="location.href='/jobs'">
      <div class="slide-label">Jobs</div>
      <div class="slide-desc">Browse, inspect, and manage<br>all submitted jobs.</div>
      <div class="slide-arrow">&#8594;</div>
    </div>
  </div>

  <script>
    let currentSlide = 0;
    const SLIDE_COUNT = 5;
    let isAnimating   = false;
    const navUp   = document.getElementById('nav-up');
    const navDown = document.getElementById('nav-down');

    function goToSlide(idx) {
      if (idx < 0 || idx >= SLIDE_COUNT || isAnimating) return;
      isAnimating = true;
      currentSlide = idx;
      document.getElementById('slides-wrap').style.transform = `translateY(-${idx * 100}vh)`;
      navUp.classList.toggle('hidden',   currentSlide === 0);
      navDown.classList.toggle('hidden', currentSlide === SLIDE_COUNT - 1);
      setTimeout(() => { isAnimating = false; }, 700);
    }

    window.addEventListener('wheel', (e) => {
      e.preventDefault();
      if (isAnimating) return;
      if (e.deltaY >  5) goToSlide(currentSlide + 1);
      if (e.deltaY < -5) goToSlide(currentSlide - 1);
    }, { passive: false });

    window.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowDown' || e.key === 'PageDown') goToSlide(currentSlide + 1);
      if (e.key === 'ArrowUp'   || e.key === 'PageUp'  ) goToSlide(currentSlide - 1);
    });

    let _touchY = 0;
    window.addEventListener('touchstart', (e) => { _touchY = e.touches[0].clientY; }, { passive: true });
    window.addEventListener('touchend',   (e) => {
      const dy = _touchY - e.changedTouches[0].clientY;
      if (Math.abs(dy) > 60) goToSlide(dy > 0 ? currentSlide + 1 : currentSlide - 1);
    });
  </script>
  <script src="/js/nav-mobile.js"></script>
</body>
</html>
