<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Job Server</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: monospace; background: #111; color: #ccc; padding: 24px; max-width: 900px; margin: 0 auto; }
    h1 { color: #fff; font-size: 1.4rem; }
    #header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    button.danger { background: #922; margin-top: 0; }
    button.danger:hover { background: #b33; }
    h2 { color: #aaa; font-size: 1rem; margin-bottom: 12px; }
    section { background: #1a1a1a; border: 1px solid #333; border-radius: 4px; padding: 16px; margin-bottom: 20px; }
    label { display: block; color: #888; font-size: 0.8rem; margin-bottom: 4px; margin-top: 10px; }
    input, textarea, select {
      width: 100%; padding: 6px 8px; background: #222; border: 1px solid #444;
      color: #ccc; font-family: monospace; font-size: 0.85rem; border-radius: 3px;
    }
    textarea { resize: vertical; min-height: 60px; }
    button {
      margin-top: 12px; padding: 8px 20px; background: #2a6; color: #fff;
      border: none; border-radius: 3px; cursor: pointer; font-family: monospace; font-size: 0.85rem;
    }
    button:hover { background: #3b7; }
    button.secondary { background: #444; }
    button.secondary:hover { background: #555; }
    #jobs-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    #jobs-table th { text-align: left; color: #666; padding: 4px 8px; border-bottom: 1px solid #333; }
    #jobs-table td { padding: 4px 8px; border-bottom: 1px solid #222; }
    #jobs-table tr:hover td { background: #222; cursor: pointer; }
    .status-queued { color: #aaa; }
    .status-running { color: #fa0; }
    .status-done { color: #2a6; }
    .status-failed { color: #e44; }
    #detail { display: none; }
    #detail pre { background: #222; padding: 10px; border-radius: 3px; overflow-x: auto; font-size: 0.78rem; color: #bbb; }
    .row { display: flex; gap: 12px; }
    .row > * { flex: 1; }
    #msg { margin-top: 8px; font-size: 0.8rem; color: #fa0; min-height: 1.2em; }
    .ov-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
    .ov-running { background: #2a6; }
    .ov-stopped { background: #555; }
    .ov-error   { background: #e44; }
    .ov-msg { margin-top: 8px; font-size: 0.8rem; min-height: 1.2em; }
    #ov-audio { margin-top: 10px; width: 100%; display: none; }
    input[type=range] { width: 100%; accent-color: #2a6; }
    details summary::-webkit-details-marker { color: #555; }
  </style>
</head>
<body>
  <div id="header">
    <h1>AI Job Server</h1>
    <button class="danger" onclick="clearQueue()">Clear Queue</button>
  </div>

  <section id="ov-section">
    <h2>OmniVoice</h2>
    <div style="display:flex;gap:20px;align-items:center;flex-wrap:wrap;font-size:0.82rem;margin-bottom:10px;">
      <span>Mode: <strong id="ov-mode">-</strong></span>
      <span>Server: <span id="ov-proc-dot" class="ov-dot ov-stopped"></span><strong id="ov-proc-state">-</strong></span>
      <span>Health: <strong id="ov-health">-</strong></span>
      <span>Active jobs: <strong id="ov-active">0</strong></span>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button onclick="ovAction('start')">Start Server</button>
      <button class="secondary" onclick="ovAction('stop')">Stop Server</button>
      <button class="secondary" onclick="ovAction('restart')">Restart Server</button>
    </div>
    <div style="display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;margin-top:12px;">
      <div>
        <label>Mode</label>
        <select id="ov-mode-select" style="width:160px;">
          <option value="ephemeral">ephemeral</option>
          <option value="persistent">persistent</option>
        </select>
      </div>
      <button onclick="saveOvConfig()" style="margin-top:0;">Save Config</button>
    </div>
    <div id="ov-ctrl-msg" class="ov-msg"></div>

    <h2 style="margin-top:16px;">Quick Voice Test</h2>
    <label>Text</label>
    <textarea id="ov-text" placeholder="Hello from OmniVoice!"></textarea>

    <div class="row">
      <div>
        <label>Language</label>
        <input id="ov-lang" type="text" list="ov-lang-list" placeholder="Auto">
        <datalist id="ov-lang-list">
          <option value="Auto">
          <option value="English">
          <option value="Chinese">
          <option value="Spanish">
          <option value="French">
          <option value="German">
          <option value="Japanese">
          <option value="Korean">
          <option value="Portuguese">
          <option value="Russian">
          <option value="Italian">
          <option value="Dutch">
          <option value="Arabic">
          <option value="Hindi">
          <option value="Turkish">
          <option value="Polish">
          <option value="Swedish">
          <option value="Vietnamese">
          <option value="Thai">
          <option value="Indonesian">
          <option value="Ukrainian">
          <option value="Greek">
          <option value="Hebrew">
          <option value="Persian">
        </datalist>
      </div>
      <div>
        <label>Speed</label>
        <input id="ov-spd" type="number" step="0.05" min="0.5" max="1.5" value="1.0">
      </div>
    </div>

    <details style="margin-top:12px;">
      <summary style="cursor:pointer;color:#888;font-size:0.82rem;user-select:none;">Voice Design</summary>
      <div class="row" style="margin-top:8px;">
        <div>
          <label>Gender / 性别</label>
          <select id="ov-gender">
            <option value="Auto">Auto</option>
            <option value="Male / 男">Male</option>
            <option value="Female / 女">Female</option>
          </select>
        </div>
        <div>
          <label>Age / 年龄</label>
          <select id="ov-age">
            <option value="Auto">Auto</option>
            <option value="Child / 儿童">Child</option>
            <option value="Teenager / 少年">Teenager</option>
            <option value="Young Adult / 青年">Young Adult</option>
            <option value="Middle-aged / 中年">Middle-aged</option>
            <option value="Elderly / 老年">Elderly</option>
          </select>
        </div>
        <div>
          <label>Pitch / 音调</label>
          <select id="ov-pitch">
            <option value="Auto">Auto</option>
            <option value="Very Low Pitch / 极低音调">Very Low</option>
            <option value="Low Pitch / 低音调">Low</option>
            <option value="Moderate Pitch / 中音调">Moderate</option>
            <option value="High Pitch / 高音调">High</option>
            <option value="Very High Pitch / 极高音调">Very High</option>
          </select>
        </div>
      </div>
      <div class="row">
        <div>
          <label>Style / 风格</label>
          <select id="ov-style">
            <option value="Auto">Auto</option>
            <option value="Whisper / 耳语">Whisper</option>
          </select>
        </div>
        <div>
          <label>English Accent <span style="color:#555;font-size:0.75rem;">(EN only)</span></label>
          <select id="ov-accent">
            <option value="Auto">Auto</option>
            <option value="American Accent / 美式口音">American</option>
            <option value="Australian Accent / 澳大利亚口音">Australian</option>
            <option value="British Accent / 英国口音">British</option>
            <option value="Canadian Accent / 加拿大口音">Canadian</option>
            <option value="Chinese Accent / 中国口音">Chinese</option>
            <option value="Indian Accent / 印度口音">Indian</option>
            <option value="Japanese Accent / 日本口音">Japanese</option>
            <option value="Korean Accent / 韩国口音">Korean</option>
            <option value="Portuguese Accent / 葡萄牙口音">Portuguese</option>
            <option value="Russian Accent / 俄罗斯口音">Russian</option>
          </select>
        </div>
        <div>
          <label>Chinese Dialect <span style="color:#555;font-size:0.75rem;">(ZH only)</span></label>
          <select id="ov-dialect">
            <option value="Auto">Auto</option>
            <option value="Northeast Dialect / 东北话">Northeast (东北话)</option>
            <option value="Sichuan Dialect / 四川话">Sichuan (四川话)</option>
            <option value="Henan Dialect / 河南话">Henan (河南话)</option>
            <option value="Shaanxi Dialect / 陕西话">Shaanxi (陕西话)</option>
            <option value="Guizhou Dialect / 贵州话">Guizhou (贵州话)</option>
            <option value="Yunnan Dialect / 云南话">Yunnan (云南话)</option>
            <option value="Guilin Dialect / 桂林话">Guilin (桂林话)</option>
            <option value="Jinan Dialect / 济南话">Jinan (济南话)</option>
            <option value="Shijiazhuang Dialect / 石家庄话">Shijiazhuang (石家庄话)</option>
            <option value="Gansu Dialect / 甘肃话">Gansu (甘肃话)</option>
            <option value="Ningxia Dialect / 宁夏话">Ningxia (宁夏话)</option>
            <option value="Qingdao Dialect / 青岛话">Qingdao (青岛话)</option>
          </select>
        </div>
      </div>
    </details>

    <details style="margin-top:8px;">
      <summary style="cursor:pointer;color:#888;font-size:0.82rem;user-select:none;">Generation Settings</summary>
      <div style="margin-top:10px;">
        <label>Inference Steps: <strong id="ov-steps-val">32</strong>
          <span style="color:#555;font-size:0.75rem;"> (4–64 · lower=faster · higher=quality)</span>
        </label>
        <input id="ov-steps" type="range" min="4" max="64" step="1" value="32"
               oninput="document.getElementById('ov-steps-val').textContent=this.value"
               style="margin-top:4px;">
      </div>
      <div style="margin-top:10px;">
        <label>Guidance Scale (CFG): <strong id="ov-cfg-val">2.0</strong>
          <span style="color:#555;font-size:0.75rem;"> (0–4 · default 2.0)</span>
        </label>
        <input id="ov-cfg" type="range" min="0" max="4" step="0.1" value="2.0"
               oninput="document.getElementById('ov-cfg-val').textContent=parseFloat(this.value).toFixed(1)"
               style="margin-top:4px;">
      </div>
    </details>

    <button onclick="ovSubmitVoice()" style="margin-top:14px;">Synthesize</button>
    <div id="ov-job-msg" class="ov-msg"></div>
    <audio id="ov-audio" controls></audio>
  </section>

  <section>
    <h2>Submit Image Job</h2>
    <label>Prompt</label>
    <textarea id="img-prompt" placeholder="a photorealistic cat on the moon"></textarea>
    <div class="row">
      <div>
        <label>Width</label>
        <input id="img-width" type="number" value="512">
      </div>
      <div>
        <label>Height</label>
        <input id="img-height" type="number" value="512">
      </div>
      <div>
        <label>Steps</label>
        <input id="img-steps" type="number" value="20">
      </div>
    </div>
    <label>Negative Prompt (optional)</label>
    <input id="img-neg" type="text" placeholder="">
    <label>Model (optional)</label>
    <input id="img-model" type="text" placeholder="">
    <button onclick="submitImage()">Submit</button>
    <div id="img-msg" class="msg"></div>
  </section>

  <section>
    <h2>Submit Voice Job</h2>
    <label>Text</label>
    <textarea id="voice-text" placeholder="Hello, world!"></textarea>
    <div class="row">
      <div>
        <label>Voice (optional)</label>
        <input id="voice-name" type="text" placeholder="">
      </div>
      <div>
        <label>Speed</label>
        <input id="voice-speed" type="number" step="0.1" value="1.0">
      </div>
      <div>
        <label>Language (optional)</label>
        <input id="voice-lang" type="text" placeholder="en">
      </div>
    </div>
    <button onclick="submitVoice()">Submit</button>
    <div id="voice-msg" class="msg"></div>
  </section>

  <section>
    <h2>Jobs <button class="secondary" onclick="loadJobs()" style="margin-top:0;padding:4px 10px;font-size:0.75rem;">Refresh</button></h2>
    <table id="jobs-table">
      <thead>
        <tr>
          <th>Job ID</th>
          <th>Type</th>
          <th>Status</th>
          <th>Created</th>
        </tr>
      </thead>
      <tbody id="jobs-body">
        <tr><td colspan="4" style="color:#555;padding:8px;">Loading...</td></tr>
      </tbody>
    </table>
  </section>

  <section id="detail">
    <h2>Job Detail</h2>
    <div id="detail-content"></div>
    <div style="margin-top:12px;">
      <strong style="color:#888;font-size:0.8rem;">Files:</strong>
      <div id="detail-files" style="margin-top:6px;font-size:0.8rem;"></div>
    </div>
  </section>

  <script>
    const FILES = ['status.json', 'request.json', 'input.txt', 'logs.txt', 'artifacts.json'];

    async function api(path, method = 'GET', body = null) {
      const opts = { method, headers: { 'Content-Type': 'application/json' } };
      if (body) opts.body = JSON.stringify(body);
      const r = await fetch('/v1' + path, opts);
      if (!r.ok) throw new Error(await r.text());
      return r.json();
    }

    function statusClass(s) { return 'status-' + s; }

    async function loadJobs() {
      const tbody = document.getElementById('jobs-body');
      try {
        const data = await api('/jobs');
        if (data.jobs.length === 0) {
          tbody.innerHTML = '<tr><td colspan="4" style="color:#555;padding:8px;">No jobs yet.</td></tr>';
          return;
        }
        tbody.innerHTML = data.jobs.map(j => `
          <tr onclick="loadDetail('${j.job_id}')">
            <td style="color:#999">${j.job_id.slice(0,8)}&hellip;</td>
            <td>${j.job_type}</td>
            <td class="${statusClass(j.status)}">${j.status}</td>
            <td>${new Date(j.created_at).toLocaleString()}</td>
          </tr>`).join('');
      } catch(e) {
        tbody.innerHTML = `<tr><td colspan="4" style="color:#e44">Error: ${e.message}</td></tr>`;
      }
    }

    async function loadDetail(jobId) {
      const section = document.getElementById('detail');
      const content = document.getElementById('detail-content');
      const filesDiv = document.getElementById('detail-files');
      section.style.display = 'block';
      try {
        const job = await api('/jobs/' + jobId);
        content.innerHTML = `<pre>${JSON.stringify(job, null, 2)}</pre>`;
        filesDiv.innerHTML = FILES.map(f =>
          `<a href="/v1/jobs/${jobId}/files/${f}" target="_blank"
              style="color:#57a;margin-right:12px;">${f}</a>`
        ).join('');
        section.scrollIntoView({ behavior: 'smooth' });
      } catch(e) {
        content.innerHTML = `<span style="color:#e44">Error: ${e.message}</span>`;
      }
    }

    async function submitImage() {
      const msg = document.getElementById('img-msg');
      msg.textContent = '';
      const body = {
        prompt: document.getElementById('img-prompt').value,
        width: parseInt(document.getElementById('img-width').value),
        height: parseInt(document.getElementById('img-height').value),
        steps: parseInt(document.getElementById('img-steps').value),
      };
      const neg = document.getElementById('img-neg').value;
      const model = document.getElementById('img-model').value;
      if (neg) body.negative_prompt = neg;
      if (model) body.model = model;
      try {
        const job = await api('/jobs/image', 'POST', body);
        msg.style.color = '#2a6';
        msg.textContent = `Created job ${job.job_id}`;
        loadJobs();
      } catch(e) {
        msg.style.color = '#e44';
        msg.textContent = 'Error: ' + e.message;
      }
    }

    async function submitVoice() {
      const msg = document.getElementById('voice-msg');
      msg.textContent = '';
      const body = {
        text: document.getElementById('voice-text').value,
        speed: parseFloat(document.getElementById('voice-speed').value),
      };
      const voice = document.getElementById('voice-name').value;
      const lang = document.getElementById('voice-lang').value;
      if (voice) body.voice = voice;
      if (lang) body.language = lang;
      try {
        const job = await api('/jobs/voice', 'POST', body);
        msg.style.color = '#2a6';
        msg.textContent = `Created job ${job.job_id}`;
        loadJobs();
      } catch(e) {
        msg.style.color = '#e44';
        msg.textContent = 'Error: ' + e.message;
      }
    }

    async function clearQueue() {
      if (!confirm('Delete all queued jobs? This cannot be undone.')) return;
      try {
        const r = await fetch('/v1/jobs', { method: 'DELETE' });
        if (!r.ok) throw new Error(await r.text());
        const data = await r.json();
        alert(`Removed ${data.removed} queued job${data.removed === 1 ? '' : 's'}.`);
        location.reload();
      } catch(e) {
        alert('Error: ' + e.message);
      }
    }

    loadJobs();

    // -----------------------------------------------------------------------
    // OmniVoice panel
    // -----------------------------------------------------------------------

    let _ovJobPollTimer = null;

    async function ovFetch(path, method = 'GET', body = null) {
      const opts = { method, headers: { 'Content-Type': 'application/json' } };
      if (body) opts.body = JSON.stringify(body);
      const r = await fetch('/v1/omnivoice' + path, opts);
      if (!r.ok) throw new Error(await r.text());
      return r.json();
    }

    async function loadOvStatus() {
      try {
        const s = await ovFetch('/status');
        document.getElementById('ov-mode').textContent = s.mode;
        document.getElementById('ov-proc-state').textContent = s.persistent.process_state;
        const dot = document.getElementById('ov-proc-dot');
        dot.className = 'ov-dot ' + (
          s.persistent.process_state === 'running' ? 'ov-running' : 'ov-stopped'
        );
        document.getElementById('ov-health').textContent = s.persistent.health;
        document.getElementById('ov-active').textContent = s.active_voice_jobs;
        document.getElementById('ov-mode-select').value = s.mode;
      } catch (e) {
        document.getElementById('ov-proc-state').textContent = 'unreachable';
      }
    }

    async function ovAction(action) {
      const msg = document.getElementById('ov-ctrl-msg');
      msg.textContent = '';
      try {
        await ovFetch('/' + action, 'POST');
        await loadOvStatus();
        msg.style.color = '#2a6';
        msg.textContent = action + ' OK';
      } catch (e) {
        msg.style.color = '#e44';
        msg.textContent = 'Error: ' + e.message;
      }
    }

    async function saveOvConfig() {
      const msg = document.getElementById('ov-ctrl-msg');
      const mode = document.getElementById('ov-mode-select').value;
      try {
        const cfg = await ovFetch('/config');
        cfg.mode = mode;
        await ovFetch('/config', 'PUT', cfg);
        await loadOvStatus();
        msg.style.color = '#2a6';
        msg.textContent = 'Config saved.';
      } catch (e) {
        msg.style.color = '#e44';
        msg.textContent = 'Error: ' + e.message;
      }
    }

    function _buildInstruct() {
      const ids = ['ov-gender', 'ov-age', 'ov-pitch', 'ov-style', 'ov-accent', 'ov-dialect'];
      const parts = [];
      for (const id of ids) {
        const v = document.getElementById(id).value;
        if (!v || v === 'Auto') continue;
        if (v.includes(' / ')) {
          const en = v.split(' / ')[0];
          const zh = v.split(' / ')[1];
          parts.push(en.includes('Dialect') ? zh.trim() : en.trim());
        } else {
          parts.push(v);
        }
      }
      return parts.join(', ');
    }

    async function ovSubmitVoice() {
      const msg = document.getElementById('ov-job-msg');
      const audio = document.getElementById('ov-audio');
      audio.style.display = 'none';
      msg.textContent = '';
      const body = {
        text: document.getElementById('ov-text').value,
        speed: parseFloat(document.getElementById('ov-spd').value),
        num_step: parseInt(document.getElementById('ov-steps').value),
        guidance_scale: parseFloat(document.getElementById('ov-cfg').value),
      };
      const lang = document.getElementById('ov-lang').value.trim();
      if (lang && lang !== 'Auto') body.language = lang;
      const instruct = _buildInstruct();
      if (instruct) body.instruct = instruct;
      try {
        const job = await api('/jobs/voice', 'POST', body);
        msg.style.color = '#fa0';
        msg.textContent = 'Job ' + job.job_id.slice(0, 8) + '... - synthesizing';
        if (_ovJobPollTimer) clearInterval(_ovJobPollTimer);
        _ovJobPollTimer = setInterval(() => _pollOvJob(job.job_id), 3000);
        loadJobs();
      } catch (e) {
        msg.style.color = '#e44';
        msg.textContent = 'Error: ' + e.message;
      }
    }

    async function _pollOvJob(jobId) {
      try {
        const job = await api('/jobs/' + jobId);
        const msg = document.getElementById('ov-job-msg');
        const audio = document.getElementById('ov-audio');
        if (job.status === 'done') {
          clearInterval(_ovJobPollTimer);
          _ovJobPollTimer = null;
          msg.style.color = '#2a6';
          msg.textContent = 'Done — playing output.wav';
          audio.src = '/v1/jobs/' + jobId + '/files/output.wav';
          audio.style.display = 'block';
          audio.load();
          loadJobs();
        } else if (job.status === 'error') {
          clearInterval(_ovJobPollTimer);
          _ovJobPollTimer = null;
          msg.style.color = '#e44';
          msg.textContent = 'Error: ' + (job.error || 'unknown');
          loadJobs();
        } else {
          msg.textContent = 'Job ' + jobId.slice(0, 8) + '... - ' + job.status;
        }
      } catch (e) { /* ignore transient poll errors */ }
    }

    setInterval(loadOvStatus, 3000);
    loadOvStatus();
  </script>
</body>
</html>
