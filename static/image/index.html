<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Visual · AI Job Server</title>
  <link rel="stylesheet" href="/css/responsive.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <nav id="topnav"></nav>

  <div id="panels">
    <div id="panel-left">
      <div id="recreate-notice" class="recreate-notice" style="display:none;"></div>
      <label>Workflow</label>
      <select id="gen-workflow" onchange="onWorkflowChange()">
        <option value="">— select a workflow —</option>
      </select>

      <label>Prompt</label>
      <textarea id="gen-prompt" rows="4" placeholder="Describe the image…"></textarea>

      <div id="gen-workflow-error" class="msg" style="color:#c44;display:none;"></div>

      <button id="gen-submit" onclick="submitGenerate()" disabled style="margin-top:20px;">
        Generate
      </button>
    </div>
    <div id="panel-right">
      <p class="section-label">OUTPUT</p>
      <div id="gen-status" class="msg"></div>
      <div id="gen-images"></div>
    </div>
  </div>

  <script src="/js/nav.js"></script>
  <script src="/js/wildcards.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/escape.js"></script>
  <script src="/js/poll.js"></script>
  <script src="/js/toast.js"></script>
  <script src="generate-tab.js"></script>
  <script src="image.js"></script>
  <script src="/js/nav-mobile.js"></script>
</body>
</html>
