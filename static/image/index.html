<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Image · AI Job Server</title>
  <link rel="stylesheet" href="/css/responsive.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <nav id="topnav"></nav>

  <div id="panels">

    <!-- ── Left: Controls ── -->
    <div id="panel-left">
      <label>Prompt</label>
      <textarea id="img-prompt" style="min-height:140px;" placeholder="a photorealistic cat on the moon"></textarea>

      <div class="row dims-row" style="margin-top:2px;">
        <div>
          <label>Width</label>
          <input id="img-width" type="number" value="512">
        </div>
        <div>
          <label>Height</label>
          <input id="img-height" type="number" value="512">
        </div>
        <div>
          <label>Steps</label>
          <input id="img-steps" type="number" value="20">
        </div>
      </div>

      <label>Negative Prompt</label>
      <input id="img-neg" type="text" placeholder="">

      <label>Model</label>
      <input id="img-model" type="text" placeholder="">

      <button onclick="submitImage()" style="margin-top:20px;">Submit</button>
    </div>

    <!-- ── Right: Output ── -->
    <div id="panel-right">
      <p class="section-label" style="margin-bottom:14px;">OUTPUT</p>
      <div id="img-msg" class="msg" style="margin-top:0;"></div>
      <div id="img-right-hint" style="color:#222;font-size:0.74rem;margin-top:8px;">
        Submit a job to see status here.
      </div>
    </div>

  </div>

  <script src="/js/nav.js"></script>
  <script src="image.js"></script>
  <script src="/js/nav-mobile.js"></script>
</body>
</html>
