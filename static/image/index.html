<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Visual · AI Job Server</title>
  <link rel="stylesheet" href="/css/responsive.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <nav id="topnav"></nav>

  <div id="tab-bar">
    <button class="tab-btn active" data-tab="generate" onclick="switchTab('generate')">Generate</button>
    <button class="tab-btn"        data-tab="prompts"  onclick="switchTab('prompts')">Prompts</button>
  </div>

  <!-- ── Generate tab ───────────────────────────────────────────────── -->
  <div id="tab-generate" class="tab-pane active" role="tabpanel">
    <div id="panels">
      <div id="panel-left">
        <div id="recreate-notice" class="recreate-notice" style="display:none;"></div>
        <label>Workflow</label>
        <select id="gen-workflow" onchange="onWorkflowChange()">
          <option value="">— select a workflow —</option>
        </select>

        <label>Prompt</label>
        <div class="prompt-toolbar">
          <select id="gen-prompt-load" onchange="onLoadSavedPrompt()">
            <option value="">— load saved prompt —</option>
          </select>
          <button id="gen-prompt-save" type="button" onclick="savePromptDialog()">Save</button>
        </div>
        <textarea id="gen-prompt" rows="4" placeholder="Describe the image…"></textarea>

        <div id="gen-image-params"></div>

        <div id="gen-workflow-error" class="msg" style="color:#c44;display:none;"></div>

        <button id="gen-submit" onclick="submitGenerate()" disabled style="margin-top:20px;">
          Generate
        </button>
      </div>
      <div id="panel-right">
        <div id="gen-resolved-prompt" class="resolved-prompt"></div>
        <p class="section-label">OUTPUT</p>
        <div id="gen-status" class="msg"></div>
        <div id="gen-images"></div>
      </div>
    </div>
  </div>

  <!-- ── Prompts tab ────────────────────────────────────────────────── -->
  <div id="tab-prompts" class="tab-pane" role="tabpanel">
    <div id="panels">

      <!-- Left: prompt list -->
      <div id="panel-left">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
          <span class="section-label">PROMPTS</span>
          <button class="secondary" onclick="newPrompt()"
                  style="margin-top:0;padding:3px 10px;font-size:0.7rem;">+ New</button>
        </div>
        <div id="prompt-list">
          <div id="prompt-empty-state" class="empty">No saved prompts yet. Click + New to create one.</div>
        </div>
      </div>

      <!-- Right: form -->
      <div id="panel-right">
        <div id="prompt-form-title-bar">
          <h2 id="prompt-form-heading">New Prompt</h2>
        </div>

        <label>Name</label>
        <input id="pf-name" type="text" placeholder="Prompt name…">

        <label>Workflow <span class="hint">(optional — leave blank for generic)</span></label>
        <select id="pf-workflow">
          <option value="">— any workflow —</option>
        </select>

        <label>Prompt</label>
        <textarea id="pf-prompt" style="min-height:220px;" placeholder="Describe the image…"></textarea>

        <div id="prompt-form-actions">
          <button onclick="savePrompt()">Save</button>
          <button class="secondary" onclick="cancelPromptForm()">Cancel</button>
          <button class="danger" id="pf-btn-delete" style="display:none;" onclick="deletePrompt()">Delete</button>
          <span id="prompt-form-msg" class="msg"></span>
        </div>
      </div>

    </div>
  </div>

  <script src="/js/nav.js"></script>
  <script src="/js/profiles-widget.js"></script>
  <script src="/js/peer-status-widget.js"></script>
  <script src="/js/wildcards.js"></script>
  <script src="/js/resolved-prompt.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/escape.js"></script>
  <script src="/js/poll.js"></script>
  <script src="/js/toast.js"></script>
  <script src="generate-tab.js"></script>
  <script src="prompts-tab.js"></script>
  <script src="image.js"></script>
  <script src="/js/nav-mobile.js"></script>
</body>
</html>
