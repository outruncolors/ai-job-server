<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Wildcards · AI Job Server</title>
  <link rel="stylesheet" href="/css/responsive.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <nav id="topnav"></nav>

  <div id="panels">

    <!-- Left: wildcard list -->
    <div id="panel-left">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
        <span class="section-label">WILDCARDS</span>
        <button class="secondary" onclick="newWildcard()"
                style="margin-top:0;padding:3px 10px;font-size:0.7rem;">+ New</button>
      </div>
      <div id="wc-list">
        <div id="empty-state" class="empty">No wildcards yet. Click + New to create one.</div>
      </div>
    </div>

    <!-- Right: form -->
    <div id="panel-right">
      <div id="form-title-bar">
        <h2 id="form-heading">New Wildcard</h2>
      </div>

      <label>Name <span class="label-hint">(used as %%name%% in prompts)</span></label>
      <input id="f-name" type="text" placeholder="character, mood, style…"
             oninput="_updatePreview()">
      <div id="f-name-preview" class="name-preview"></div>

      <label style="margin-top:14px;">Description <span class="label-hint">(optional)</span></label>
      <input id="f-description" type="text" placeholder="short note about what this wildcard is for…">

      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:16px;margin-bottom:6px;">
        <label style="margin:0;">Entries</label>
        <button class="secondary" onclick="addEntry()"
                style="margin-top:0;padding:2px 8px;font-size:0.7rem;">+ Add Entry</button>
      </div>
      <div id="f-entries"></div>
      <div id="f-entries-empty" class="hint" style="padding:6px 0;">
        Add at least one entry.
      </div>

      <div id="form-actions">
        <button onclick="saveWildcard()">Save</button>
        <button class="secondary" onclick="cancelForm()">Cancel</button>
        <button class="danger" id="btn-delete" style="display:none;" onclick="deleteWildcard()">Delete</button>
        <span id="form-msg" class="msg"></span>
      </div>
    </div>

  </div>

  <script src="/js/nav.js"></script>
  <script src="/js/profiles-widget.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/escape.js"></script>
  <script src="/js/toast.js"></script>
  <script src="wildcards.js"></script>
  <script src="/js/nav-mobile.js"></script>
</body>
</html>
