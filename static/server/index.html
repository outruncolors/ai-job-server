<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Server · AI Job Server</title>
  <link rel="stylesheet" href="/css/responsive.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="toast-stack"></div>

<nav id="topnav"></nav>

<div id="panels">
  <div id="panel-left">

    <div class="panel-section">
      <p class="section-label">Resources</p>
      <div class="stat-grid">
        <div class="stat-row">
          <span class="stat-label">CPU</span>
          <div class="stat-bar-wrap"><div class="stat-bar" id="bar-cpu"></div></div>
          <span class="stat-val" id="val-cpu">—</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Memory</span>
          <div class="stat-bar-wrap"><div class="stat-bar" id="bar-mem"></div></div>
          <span class="stat-val" id="val-mem">—</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Disk</span>
          <div class="stat-bar-wrap"><div class="stat-bar" id="bar-disk"></div></div>
          <span class="stat-val" id="val-disk">—</span>
        </div>
      </div>
    </div>

    <div class="panel-section">
      <p class="section-label">Jobs</p>
      <div class="jobs-counts" id="jobs-counts">
        <div class="count-badge"><div class="count-num" style="color:#777" id="cnt-queued">—</div><div class="count-lbl">Queued</div></div>
        <div class="count-badge"><div class="count-num" style="color:#fa0" id="cnt-running">—</div><div class="count-lbl">Running</div></div>
        <div class="count-badge"><div class="count-num" style="color:#2a6" id="cnt-done">—</div><div class="count-lbl">Done</div></div>
        <div class="count-badge"><div class="count-num" style="color:#e44" id="cnt-failed">—</div><div class="count-lbl">Failed</div></div>
      </div>
    </div>

    <div style="font-size:0.66rem;color:#2a2a2a;margin-top:-16px;" id="refresh-hint">auto-refresh every 5s</div>

  </div>

  <div id="panel-right">

    <div class="panel-section">
      <p class="section-label">Server Info</p>
      <div class="info-grid" id="server-info">
        <div class="info-row"><span class="info-key">Hostname</span><span class="info-val" id="info-hostname">—</span></div>
        <div class="info-row"><span class="info-key">Python</span><span class="info-val" id="info-python">—</span></div>
        <div class="info-row"><span class="info-key">Uptime</span><span class="info-val" id="info-uptime">—</span></div>
      </div>
    </div>

    <div class="panel-section">
      <p class="section-label">Actions</p>
      <button id="restart-btn" class="danger" onclick="doRestart()">Restart Server</button>
      <p class="msg" id="action-msg"></p>
    </div>

    <div class="panel-section">
      <p class="section-label">Recent Actions</p>
      <div id="action-log"><div class="log-entry" style="color:#2a2a2a">No actions yet.</div></div>
    </div>

  </div>
</div>

<script src="/js/nav.js"></script>
<script src="server.js"></script>
<script src="/js/nav-mobile.js"></script>
</body>
</html>
