<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Context Library · AI Job Server</title>
  <link rel="stylesheet" href="/css/responsive.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <nav id="topnav"></nav>

  <div id="panels">

    <!-- Left: item list -->
    <div id="panel-left">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
        <span class="section-label">ITEMS</span>
        <button class="secondary" onclick="newItem()"
                style="margin-top:0;padding:3px 10px;font-size:0.7rem;">+ New</button>
      </div>
      <div id="item-list">
        <div id="empty-state" class="empty">No context items yet. Click + New to create one.</div>
      </div>
    </div>

    <!-- Right: form -->
    <div id="panel-right">
      <div id="form-title-bar">
        <h2 id="form-heading">New Item</h2>
      </div>

      <label>Title</label>
      <input id="f-title" type="text" placeholder="Item title…">

      <label>Tags <span class="hint">(comma-separated)</span></label>
      <input id="f-tags" type="text" placeholder="api, reference, docs…">

      <label>Description</label>
      <textarea id="f-desc" style="min-height:48px;" placeholder="Short description…"></textarea>

      <label>Content</label>
      <textarea id="f-content" id="form-content" style="min-height:220px;" placeholder="Paste or type the context text…"></textarea>

      <div id="form-actions">
        <button onclick="saveItem()">Save</button>
        <button class="secondary" onclick="cancelForm()">Cancel</button>
        <button class="danger" id="btn-delete" style="display:none;" onclick="deleteItem()">Delete</button>
        <span id="form-msg" class="msg"></span>
      </div>
    </div>

  </div>

  <script src="/js/nav.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/escape.js"></script>
  <script src="/js/toast.js"></script>
  <script src="context.js"></script>
  <script src="/js/nav-mobile.js"></script>
</body>
</html>
