<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>MCP · AI Job Server</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: monospace; background: #111; color: #ccc; overflow: hidden; }

    label { display: block; color: #777; font-size: 0.76rem; margin-bottom: 3px; margin-top: 10px; }
    input, select { width: 100%; padding: 6px 8px; background: #181818; border: 1px solid #2e2e2e; color: #ccc; font-family: monospace; font-size: 0.82rem; border-radius: 3px; }
    input:focus, select:focus { outline: none; border-color: #4a4a4a; }
    button { padding: 7px 18px; background: #2a6; color: #fff; border: none; border-radius: 3px; cursor: pointer; font-family: monospace; font-size: 0.82rem; margin-top: 10px; }
    button:hover { background: #3b7; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    #topnav {
      position: fixed; top: 0; left: 0; right: 0; height: 44px;
      display: flex; align-items: center; padding: 0 20px; gap: 20px;
      background: #111; border-bottom: 1px solid #1a1a1a; z-index: 100;
    }
    #topnav a { color: #444; text-decoration: none; font-size: 0.72rem; letter-spacing: 0.06em; transition: color 0.15s; }
    #topnav a:hover { color: #888; }
    #topnav .nav-home { color: #2a6; font-weight: 700; letter-spacing: 0.02em; }
    #topnav a.active { color: #ccc; }

    #panels { display: flex; height: 100vh; padding-top: 44px; }
    #panel-left  { flex: 0 0 360px; overflow-y: auto; padding: 24px 22px; border-right: 1px solid #1a1a1a; }
    #panel-right { flex: 1; overflow-y: auto; padding: 24px 28px; }

    .section-label { color: #383838; font-size: 0.66rem; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 12px; }

    /* Tool cards */
    .tool-card {
      border: 1px solid #1e1e1e; border-radius: 3px; padding: 14px 16px;
      margin-bottom: 10px; cursor: pointer; transition: border-color 0.15s, background 0.15s;
    }
    .tool-card:hover { border-color: #2a4; background: #121212; }
    .tool-card.selected { border-color: #2a6; background: #0d1a12; }
    .tool-name { font-size: 0.88rem; color: #2a6; margin-bottom: 6px; }
    .tool-desc { font-size: 0.74rem; color: #555; line-height: 1.5; }

    /* Try-it panel */
    #try-empty { color: #333; font-size: 0.82rem; margin-top: 60px; text-align: center; }
    #try-panel { display: none; }
    #try-title { font-size: 1rem; color: #ccc; margin-bottom: 6px; }
    #try-desc  { font-size: 0.76rem; color: #555; margin-bottom: 20px; line-height: 1.5; }

    /* Schema table */
    .schema-table { width: 100%; border-collapse: collapse; font-size: 0.74rem; margin-bottom: 20px; }
    .schema-table th { color: #333; font-weight: normal; text-align: left; padding: 4px 8px; border-bottom: 1px solid #1a1a1a; }
    .schema-table td { padding: 5px 8px; color: #666; border-bottom: 1px solid #161616; vertical-align: top; }
    .schema-table td:first-child { color: #999; }
    .req-badge { font-size: 0.62rem; color: #2a6; border: 1px solid #2a4; border-radius: 2px; padding: 1px 4px; }

    /* Result area */
    #result-wrap { margin-top: 20px; }
    #result-label { color: #383838; font-size: 0.66rem; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 8px; }
    #result-box {
      background: #0c0c0c; border: 1px solid #1e1e1e; border-radius: 3px;
      padding: 14px; font-size: 0.78rem; color: #bbb; white-space: pre-wrap;
      min-height: 80px; max-height: 320px; overflow-y: auto;
    }
    #result-box.ok  { border-color: #1a3a22; color: #4c9; }
    #result-box.err { border-color: #3a1a1a; color: #e44; }
    #result-meta { font-size: 0.68rem; color: #333; margin-top: 6px; }

    /* Toast */
    #toast-stack {
      position: fixed; bottom: 20px; right: 20px;
      display: flex; flex-direction: column-reverse; gap: 8px;
      z-index: 500; pointer-events: none;
    }
    .toast {
      min-width: 220px; max-width: 360px; padding: 10px 14px;
      border-radius: 3px; font-size: 0.78rem; font-family: monospace;
      pointer-events: auto; border: 1px solid transparent;
      animation: toast-in 0.18s ease;
    }
    @keyframes toast-in { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: none; } }
    .toast-error { background: #250f0f; color: #e44; border-color: #451818; }
  </style>
  <link rel="stylesheet" href="/css/responsive.css">
</head>
<body>

<div id="toast-stack"></div>

<nav id="topnav">
  <a href="/" class="nav-home">AI Jobs</a>
  <a href="/chain" data-page="chain">Chain</a>
  <a href="/context/" data-page="context">Context</a>
  <a href="/voice" data-page="voice">Voice</a>
  <a href="/image" data-page="image">Image</a>
  <a href="/jobs" data-page="jobs">Jobs</a>
  <a href="/server" data-page="server">Server</a>
  <a href="/mcp" data-page="mcp">MCP</a>
</nav>

<div id="panels">
  <div id="panel-left">
    <div class="section-label">Tools</div>
    <div id="tool-list"></div>
  </div>
  <div id="panel-right">
    <div id="try-empty">Select a tool to try it.</div>
    <div id="try-panel">
      <div id="try-title"></div>
      <div id="try-desc"></div>
      <div class="section-label">Parameters</div>
      <table class="schema-table">
        <thead>
          <tr>
            <th>Name</th><th>Type</th><th>Required</th><th>Description</th>
          </tr>
        </thead>
        <tbody id="schema-tbody"></tbody>
      </table>
      <div class="section-label">Arguments</div>
      <div id="arg-form"></div>
      <button id="run-btn" onclick="runTool()">Run</button>
      <div id="result-wrap" style="display:none">
        <div id="result-label">Result</div>
        <div id="result-box"></div>
        <div id="result-meta"></div>
      </div>
    </div>
  </div>
</div>

<script>
  let _tools = [];
  let _selected = null;

  // Mark active nav link
  document.querySelectorAll('#topnav a[data-page]').forEach(a => {
    if (a.dataset.page === 'mcp') a.classList.add('active');
  });

  async function api(path, method = 'GET', body = null) {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (body !== null) opts.body = JSON.stringify(body);
    const r = await fetch(path, opts);
    if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
    return r.json();
  }

  function toast(msg) {
    const el = document.createElement('div');
    el.className = 'toast toast-error';
    el.textContent = msg;
    document.getElementById('toast-stack').appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }

  function _escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  async function loadTools() {
    try {
      const data = await api('/v1/mcp/tools');
      _tools = data.tools || [];
      renderToolList();
    } catch (e) {
      toast('Failed to load tools: ' + e.message);
    }
  }

  function renderToolList() {
    const list = document.getElementById('tool-list');
    if (_tools.length === 0) {
      list.innerHTML = '<div style="color:#333;font-size:0.78rem">No tools registered.</div>';
      return;
    }
    list.innerHTML = _tools.map(t => `
      <div class="tool-card" id="card-${_escHtml(t.name)}" onclick="selectTool(${_escHtml(JSON.stringify(t.name))})">
        <div class="tool-name">${_escHtml(t.name)}</div>
        <div class="tool-desc">${_escHtml(t.description)}</div>
      </div>
    `).join('');
  }

  function selectTool(name) {
    const tool = _tools.find(t => t.name === name);
    if (!tool) return;
    _selected = tool;

    document.querySelectorAll('.tool-card').forEach(c => c.classList.remove('selected'));
    const card = document.getElementById('card-' + name);
    if (card) card.classList.add('selected');

    document.getElementById('try-empty').style.display = 'none';
    const panel = document.getElementById('try-panel');
    panel.style.display = 'block';

    document.getElementById('try-title').textContent = tool.name;
    document.getElementById('try-desc').textContent = tool.description;

    // Schema table
    const props = tool.input_schema.properties;
    const required = tool.input_schema.required || [];
    const tbody = document.getElementById('schema-tbody');
    tbody.innerHTML = Object.entries(props).map(([k, p]) => `
      <tr>
        <td>${_escHtml(k)}</td>
        <td>${_escHtml(p.type)}</td>
        <td>${required.includes(k) ? '<span class="req-badge">required</span>' : '<span style="color:#333">—</span>'}</td>
        <td>${_escHtml(p.description)}</td>
      </tr>
    `).join('');

    // Arg form
    const form = document.getElementById('arg-form');
    form.innerHTML = Object.entries(props).map(([k, p]) => {
      let input;
      if (p.type === 'boolean') {
        input = `<input type="checkbox" id="arg-${_escHtml(k)}" style="width:auto">`;
      } else if (p.enum) {
        input = `<select id="arg-${_escHtml(k)}"><option value="">— select —</option>${p.enum.map(v => `<option value="${_escHtml(v)}">${_escHtml(v)}</option>`).join('')}</select>`;
      } else {
        const isNum = p.type === 'integer' || p.type === 'number';
        const attrs = isNum ? 'type="number" step="1"' : 'type="text"';
        input = `<input ${attrs} id="arg-${_escHtml(k)}" placeholder="${_escHtml(p.description)}">`;
      }
      return `<label>${_escHtml(k)}</label>${input}`;
    }).join('');

    document.getElementById('result-wrap').style.display = 'none';
  }

  async function runTool() {
    if (!_selected) return;
    const btn = document.getElementById('run-btn');
    btn.disabled = true;

    const props = _selected.input_schema.properties;
    const args = {};
    for (const [k, p] of Object.entries(props)) {
      const el = document.getElementById('arg-' + k);
      if (!el) continue;
      if (p.type === 'boolean') {
        args[k] = el.checked;
      } else if (p.type === 'integer') {
        const raw = el.value.trim();
        if (raw !== '') args[k] = parseInt(raw, 10);
      } else if (p.type === 'number') {
        const raw = el.value.trim();
        if (raw !== '') args[k] = parseFloat(raw);
      } else {
        const raw = el.value.trim();
        if (raw !== '') args[k] = raw;
      }
    }

    const box = document.getElementById('result-box');
    const meta = document.getElementById('result-meta');
    document.getElementById('result-wrap').style.display = 'block';
    box.className = '';
    box.textContent = '…';
    meta.textContent = '';

    try {
      const data = await api(`/v1/mcp/tools/${_selected.name}/call`, 'POST', { arguments: args });
      if (data.validation_status) {
        box.className = 'err';
        box.textContent = data.error;
        meta.textContent = `status: ${data.validation_status}`;
      } else {
        box.className = 'ok';
        box.textContent = JSON.stringify(data.result, null, 2);
        meta.textContent = `${data.execution_ms} ms · ${data.timestamp}`;
      }
    } catch (e) {
      box.className = 'err';
      box.textContent = e.message;
    }

    btn.disabled = false;
  }

  loadTools();
</script>
<script src="/js/nav-mobile.js"></script>
</body>
</html>
