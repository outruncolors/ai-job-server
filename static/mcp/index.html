<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>MCP · AI Job Server</title>
  <link rel="stylesheet" href="/css/responsive.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<nav id="topnav"></nav>

<div id="gateway-bar">
  <div id="gw-status">
    <span class="gw-dot" id="gw-dot"></span>
    <span id="gw-text">MCP gateway: …</span>
  </div>
  <div id="gw-actions">
    <button onclick="gwStart()">Start</button>
    <button onclick="gwStop()">Stop</button>
    <button onclick="gwRestart()">Restart</button>
    <button onclick="refreshAll()">Refresh</button>
  </div>
</div>
<div id="server-list"></div>

<div id="panels">
  <div id="panel-left">
    <div class="section-label">Tools <span id="tool-count" class="count"></span></div>
    <div id="tool-list"></div>
    <div class="section-label">Resources <span id="res-count" class="count"></span></div>
    <div id="res-list"></div>
    <div class="section-label">Prompts <span id="prompt-count" class="count"></span></div>
    <div id="prompt-list"></div>
  </div>
  <div id="panel-right">
    <div id="try-empty" class="empty">Select a tool to try it.</div>
    <div id="try-panel">
      <div id="try-title"></div>
      <div id="try-desc"></div>
      <div class="section-label">Parameters</div>
      <table class="schema-table">
        <thead>
          <tr>
            <th>Name</th><th>Type</th><th>Required</th><th>Description</th>
          </tr>
        </thead>
        <tbody id="schema-tbody"></tbody>
      </table>
      <div class="section-label">Arguments</div>
      <div id="arg-form"></div>
      <button id="run-btn" onclick="runTool()">Run</button>
      <div id="result-wrap" style="display:none">
        <div id="result-label">Result</div>
        <div id="result-box"></div>
        <div id="result-meta"></div>
      </div>
    </div>
  </div>
</div>

<script src="/js/nav.js"></script>
<script src="/js/profiles-widget.js"></script>
<script src="/js/peer-status-widget.js"></script>
<script src="/js/api.js"></script>
<script src="/js/escape.js"></script>
<script src="/js/toast.js"></script>
<script src="mcp.js"></script>
<script src="/js/nav-mobile.js"></script>
</body>
</html>
