<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jobs · AI Job Server</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: monospace; background: #111; color: #ccc; overflow: hidden; }

    button {
      padding: 7px 18px; background: #2a6; color: #fff; border: none;
      border-radius: 3px; cursor: pointer; font-family: monospace; font-size: 0.82rem; margin-top: 10px;
    }
    button:hover { background: #3b7; }
    button.secondary { background: #333; }
    button.secondary:hover { background: #424242; }
    button.danger { background: #7a2222; }
    button.danger:hover { background: #992828; }
    .status-queued  { color: #777; }
    .status-running { color: #fa0; }
    .status-done    { color: #2a6; }
    .status-failed, .status-error { color: #e44; }
    .section-label { color: #383838; font-size: 0.66rem; letter-spacing: 0.12em; text-transform: uppercase; }

    /* ── Nav ── */
    #topnav {
      position: fixed; top: 0; left: 0; right: 0; height: 44px;
      display: flex; align-items: center; padding: 0 20px; gap: 20px;
      background: #111; border-bottom: 1px solid #1a1a1a; z-index: 100;
    }
    #topnav a {
      color: #444; text-decoration: none; font-size: 0.72rem;
      letter-spacing: 0.06em; transition: color 0.15s;
    }
    #topnav a:hover { color: #888; }
    #topnav .nav-home { color: #2a6; font-weight: 700; letter-spacing: 0.02em; }
    #topnav a.active { color: #ccc; }

    /* ── Panels ── */
    #panels { display: flex; height: 100vh; padding-top: 44px; }
    #panel-left  { width: 480px; flex-shrink: 0; overflow-y: auto; padding: 20px 0; border-right: 1px solid #1a1a1a; display: flex; flex-direction: column; }
    #panel-right { flex: 1; overflow-y: auto; padding: 24px 32px; }

    /* ── Jobs table ── */
    #jobs-toolbar { display: flex; align-items: center; gap: 8px; padding: 0 20px 12px; border-bottom: 1px solid #1a1a1a; }
    #jobs-toolbar .toolbar-label { flex: 1; color: #444; font-size: 0.66rem; letter-spacing: 0.12em; text-transform: uppercase; }
    #jobs-toolbar button { margin-top: 0; padding: 4px 12px; font-size: 0.72rem; }
    #jobs-table-wrap { flex: 1; overflow-y: auto; }
    #jobs-table { width: 100%; border-collapse: collapse; font-size: 0.74rem; }
    #jobs-table th { text-align: left; color: #484848; padding: 6px 10px; border-bottom: 1px solid #222; position: sticky; top: 0; background: #111; z-index: 1; }
    #jobs-table td { padding: 5px 10px; border-bottom: 1px solid #171717; }
    #jobs-table tr.clickable:hover td { background: #181818; cursor: pointer; }
    #jobs-table tr.active-row td { background: #141c14; }
    #jobs-table .del-cell { width: 32px; text-align: center; }
    .del-btn {
      background: none; border: none; color: #383838; cursor: pointer; font-size: 0.9rem;
      padding: 0 4px; margin-top: 0; line-height: 1; transition: color 0.15s;
    }
    .del-btn:hover { color: #e44; background: none; }
    #jobs-pagination { display: flex; align-items: center; gap: 8px; padding: 8px 16px; border-top: 1px solid #1a1a1a; font-size: 0.72rem; color: #555; }
    #jobs-pagination button { padding: 3px 10px; font-size: 0.72rem; margin-top: 0; }
    #jobs-pagination .page-info { flex: 1; text-align: center; }

    /* ── Detail panel ── */
    #detail-empty { color: #2a2a2a; font-size: 0.82rem; padding-top: 40px; }
    #detail-view { display: none; }
    .detail-meta { margin-bottom: 20px; }
    .detail-meta-row { display: flex; gap: 10px; margin-bottom: 5px; font-size: 0.78rem; }
    .detail-meta-key { color: #555; width: 90px; flex-shrink: 0; }
    .detail-meta-val { color: #bbb; word-break: break-all; }
    .detail-section { margin-bottom: 22px; }
    .detail-section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .artifact-item { margin-bottom: 12px; }
    .artifact-label { color: #555; font-size: 0.68rem; letter-spacing: 0.06em; margin-bottom: 4px; }
    .artifact-pre {
      background: #0e0e0e; padding: 12px; border-radius: 3px;
      font-size: 0.74rem; color: #bbb; white-space: pre-wrap; word-break: break-word;
      border: 1px solid #1e1e1e; max-height: 300px; overflow-y: auto;
    }
    audio { width: 100%; margin-top: 4px; }
    .raw-links { display: flex; flex-wrap: wrap; gap: 10px; }
    .raw-links a { color: #446; font-size: 0.74rem; text-decoration: none; }
    .raw-links a:hover { color: #6680aa; }
    #detail-delete-wrap { margin-top: 24px; padding-top: 16px; border-top: 1px solid #1a1a1a; }
  </style>
</head>
<body>

  <nav id="topnav">
    <a href="/" class="nav-home">AI Jobs</a>
    <a href="/chain" data-page="chain">Chain</a>
    <a href="/context/" data-page="context">Context</a>
    <a href="/voice" data-page="voice">Voice</a>
    <a href="/image" data-page="image">Image</a>
    <a href="/jobs" data-page="jobs">Jobs</a>
  </nav>

  <div id="panels">

    <!-- ── Left: Jobs table ── -->
    <div id="panel-left">
      <div id="jobs-toolbar">
        <span class="toolbar-label">All Jobs</span>
        <button class="secondary" onclick="loadJobs()">Refresh</button>
      </div>
      <div id="jobs-table-wrap">
        <table id="jobs-table">
          <thead>
            <tr>
              <th>Job ID</th>
              <th>Type</th>
              <th>Status</th>
              <th>Created</th>
              <th class="del-cell"></th>
            </tr>
          </thead>
          <tbody id="jobs-body">
            <tr><td colspan="5" style="color:#333;padding:10px;">Loading…</td></tr>
          </tbody>
        </table>
      </div>
      <div id="jobs-pagination"></div>
    </div>

    <!-- ── Right: Job detail ── -->
    <div id="panel-right">
      <div id="detail-empty">Select a job to view details.</div>
      <div id="detail-view">
        <div class="detail-meta" id="detail-meta"></div>

        <div class="detail-section" id="detail-artifacts-section" style="display:none;">
          <p class="section-label" style="margin-bottom:10px;">Artifacts</p>
          <div id="detail-artifacts"></div>
        </div>

        <div class="detail-section" id="detail-raw-section">
          <p class="section-label" style="margin-bottom:10px;">Files</p>
          <div class="raw-links" id="detail-raw-links"></div>
        </div>

        <div id="detail-delete-wrap">
          <button class="danger" id="detail-delete-btn" onclick="deleteCurrentJob()">Delete Job</button>
        </div>
      </div>
    </div>

  </div>

  <script>
    const JOBS_PAGE_SIZE = 25;
    let _allJobs   = [];
    let _jobsPage  = 0;
    let _activeJobId = null;

    async function api(path, method = 'GET', body = null) {
      const opts = { method, headers: { 'Content-Type': 'application/json' } };
      if (body) opts.body = JSON.stringify(body);
      const r = await fetch('/v1' + path, opts);
      if (!r.ok) throw new Error(await r.text());
      return r.json();
    }

    function statusClass(s) { return 'status-' + s; }

    function _escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ── Jobs table ──────────────────────────────────────────────────
    function _renderJobsPage() {
      const tbody = document.getElementById('jobs-body');
      const pager = document.getElementById('jobs-pagination');
      const totalPages = Math.max(1, Math.ceil(_allJobs.length / JOBS_PAGE_SIZE));
      const start = _jobsPage * JOBS_PAGE_SIZE;
      const page  = _allJobs.slice(start, start + JOBS_PAGE_SIZE);

      if (page.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" style="color:#333;padding:10px;">No jobs yet.</td></tr>';
        pager.innerHTML = '';
        return;
      }

      tbody.innerHTML = page.map(j => `
        <tr class="clickable${_activeJobId === j.job_id ? ' active-row' : ''}" data-job-id="${j.job_id}" onclick="openDetail('${j.job_id}')">
          <td style="color:#555">${j.job_id.slice(0,8)}&hellip;</td>
          <td style="color:#666">${j.job_type}</td>
          <td class="${statusClass(j.status)}">${j.status}</td>
          <td style="color:#555">${new Date(j.created_at).toLocaleString()}</td>
          <td class="del-cell">
            <button class="del-btn" title="Delete job" onclick="deleteJob(event,'${j.job_id}')">&#10005;</button>
          </td>
        </tr>`).join('');

      pager.innerHTML = totalPages <= 1 ? '' : `
        <button class="secondary" onclick="_jobsGo(-1)" ${_jobsPage === 0 ? 'disabled' : ''}>&#8592; Prev</button>
        <span class="page-info">${_jobsPage + 1} / ${totalPages}</span>
        <button class="secondary" onclick="_jobsGo(1)" ${_jobsPage >= totalPages - 1 ? 'disabled' : ''}>Next &#8594;</button>`;
    }

    function _jobsGo(delta) {
      const totalPages = Math.ceil(_allJobs.length / JOBS_PAGE_SIZE);
      _jobsPage = Math.max(0, Math.min(_jobsPage + delta, totalPages - 1));
      _renderJobsPage();
    }

    async function loadJobs() {
      const tbody = document.getElementById('jobs-body');
      try {
        const data = await api('/jobs');
        _allJobs = (data.jobs || []).slice().sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
        _jobsPage = 0;
        _renderJobsPage();
      } catch(e) {
        tbody.innerHTML = `<tr><td colspan="5" style="color:#e44;padding:10px;">Error: ${_escHtml(e.message)}</td></tr>`;
      }
    }

    // ── Job detail ───────────────────────────────────────────────────
    async function openDetail(jobId) {
      _activeJobId = jobId;
      _renderJobsPage();

      document.getElementById('detail-empty').style.display = 'none';
      const view = document.getElementById('detail-view');
      view.style.display = 'block';
      document.getElementById('detail-meta').innerHTML = '<span style="color:#333;font-size:0.78rem;">Loading…</span>';
      document.getElementById('detail-artifacts-section').style.display = 'none';
      document.getElementById('detail-artifacts').innerHTML = '';
      document.getElementById('detail-raw-links').innerHTML = '';
      document.getElementById('detail-delete-btn').dataset.jobId = jobId;

      try {
        const job = await api('/jobs/' + jobId);
        _renderMeta(job);
        await _renderArtifacts(jobId);
        _renderRawLinks(jobId);
      } catch(e) {
        document.getElementById('detail-meta').innerHTML =
          `<span style="color:#e44">Error: ${_escHtml(e.message)}</span>`;
      }
    }

    function _renderMeta(job) {
      const rows = [
        ['Job ID',   job.job_id],
        ['Type',     job.job_type],
        ['Status',   `<span class="${statusClass(job.status)}">${job.status}</span>`],
        ['Created',  new Date(job.created_at).toLocaleString()],
        ['Updated',  new Date(job.updated_at).toLocaleString()],
      ];
      if (job.error) rows.push(['Error', `<span style="color:#e44">${_escHtml(job.error)}</span>`]);
      document.getElementById('detail-meta').innerHTML = rows.map(([k,v]) =>
        `<div class="detail-meta-row"><span class="detail-meta-key">${k}</span><span class="detail-meta-val">${v}</span></div>`
      ).join('');
    }

    async function _renderArtifacts(jobId) {
      let artifacts = [];
      try {
        const r = await fetch(`/v1/jobs/${jobId}/files/artifacts.json`);
        if (r.ok) artifacts = await r.json();
      } catch(e) { return; }
      if (!artifacts || artifacts.length === 0) return;

      const section = document.getElementById('detail-artifacts-section');
      section.style.display = 'block';
      const container = document.getElementById('detail-artifacts');

      const items = await Promise.all(artifacts.map(a => _renderArtifact(jobId, a)));
      container.innerHTML = '';
      items.forEach(el => container.appendChild(el));
    }

    async function _renderArtifact(jobId, artifact) {
      const div = document.createElement('div');
      div.className = 'artifact-item';
      const label = document.createElement('div');
      label.className = 'artifact-label';
      label.textContent = artifact.filename;
      div.appendChild(label);

      const ext = artifact.filename.split('.').pop().toLowerCase();
      const url = `/v1/jobs/${jobId}/files/${artifact.filename}`;

      if (ext === 'wav' || ext === 'mp3' || ext === 'ogg') {
        const audio = document.createElement('audio');
        audio.controls = true;
        audio.src = url;
        div.appendChild(audio);
      } else if (ext === 'txt') {
        const pre = document.createElement('pre');
        pre.className = 'artifact-pre';
        pre.textContent = 'Loading…';
        div.appendChild(pre);
        try {
          const r = await fetch(url);
          if (r.ok) {
            pre.textContent = await r.text();
          } else {
            pre.textContent = '(not found)';
            pre.style.color = '#444';
          }
        } catch(e) {
          pre.textContent = 'Error loading file';
          pre.style.color = '#e44';
        }
      } else {
        const a = document.createElement('a');
        a.href = url;
        a.target = '_blank';
        a.textContent = 'Download';
        a.style.cssText = 'color:#446;font-size:0.74rem;';
        div.appendChild(a);
      }

      return div;
    }

    function _renderRawLinks(jobId) {
      const files = ['request.json', 'logs.txt', 'status.json'];
      document.getElementById('detail-raw-links').innerHTML = files.map(f =>
        `<a href="/v1/jobs/${jobId}/files/${f}" target="_blank">${f}</a>`
      ).join('');
    }

    // ── Delete ────────────────────────────────────────────────────────
    async function deleteJob(evt, jobId) {
      evt.stopPropagation();
      if (!window.confirm('Delete this job and all its files? This cannot be undone.')) return;
      try {
        const r = await fetch('/v1/jobs/' + jobId, { method: 'DELETE' });
        if (!r.ok) throw new Error(await r.text());
        _allJobs = _allJobs.filter(j => j.job_id !== jobId);
        if (_jobsPage > 0 && _jobsPage * JOBS_PAGE_SIZE >= _allJobs.length) {
          _jobsPage = Math.max(0, _jobsPage - 1);
        }
        if (_activeJobId === jobId) {
          _activeJobId = null;
          document.getElementById('detail-view').style.display = 'none';
          document.getElementById('detail-empty').style.display = 'block';
        }
        _renderJobsPage();
      } catch(e) {
        alert('Error: ' + e.message);
      }
    }

    function deleteCurrentJob() {
      const jobId = document.getElementById('detail-delete-btn').dataset.jobId;
      if (!jobId) return;
      deleteJob({ stopPropagation: () => {} }, jobId);
    }

    // ── Init ──────────────────────────────────────────────────────────
    document.querySelector('#topnav [data-page="jobs"]').classList.add('active');
    loadJobs();
  </script>
</body>
</html>
