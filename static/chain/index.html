<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Text · AI Job Server</title>
  <link rel="stylesheet" href="/css/responsive.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/output-console.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <nav id="topnav"></nav>

  <div id="panels">

    <!-- ── Left: Controls ── -->
    <div id="panel-left">

      <div id="recreate-notice" class="recreate-notice" style="display:none;"></div>
      <div id="chain-tabs">
        <button class="tab-btn active" data-tab="chain"     onclick="switchTab('chain')">Chain</button>
        <button class="tab-btn"        data-tab="sequences" onclick="switchTab('sequences')">Sequences</button>
      </div>

      <!-- ── Chain Tab ── -->
      <div id="chain-panel">

        <!-- Sequence edit bar (shown when editing or creating a sequence) -->
        <div id="seq-edit-bar" style="display:none;margin-top:12px;padding-top:12px;border-top:1px solid #1a1a1a;">
          <div id="seq-name-row">
            <input id="chain-seq-name" type="text" placeholder="Sequence name…">
            <button class="secondary" onclick="saveSeq()">Save</button>
            <button class="secondary" onclick="_cancelSeqEdit()">Cancel</button>
          </div>
          <div id="seq-edit-msg" class="msg" style="color:#fa0;"></div>
        </div>

        <!-- ── Variables pane ── -->
        <div id="chain-variables-pane">
          <div class="vars-header">
            <span class="section-label">VARIABLES</span>
            <button class="secondary" onclick="_addVariableRow()"
                    style="margin-top:0;padding:3px 10px;font-size:0.7rem;">+ Variable</button>
          </div>
          <div id="chain-variables-list"></div>
        </div>

        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:16px;margin-bottom:8px;">
          <span class="section-label">STEPS</span>
          <button class="secondary" onclick="addChainStep()"
                  style="margin-top:0;padding:3px 10px;font-size:0.7rem;">+ Add Step</button>
        </div>
        <div id="chain-board">
          <svg id="goto-arrows" aria-hidden="true"></svg>
          <div id="chain-steps-list"></div>
        </div>

        <button onclick="submitChain()" style="margin-top:16px;">Run Chain</button>
      </div>

      <!-- ── Sequences Tab ── -->
      <div id="sequences-panel" style="display:none;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
          <span class="section-label">SEQUENCES</span>
          <button class="secondary" onclick="_newSeq()"
                  style="margin-top:0;padding:3px 10px;font-size:0.7rem;">+ New</button>
        </div>
        <div id="seq-list"></div>
      </div>


    </div>

    <!-- ── Right: Output ── -->
    <div id="panel-right">
      <p class="section-label" style="margin-bottom:14px;">OUTPUT</p>
      <div id="chain-msg" class="msg" style="margin-top:0;"></div>

      <div id="chain-timeline-wrap" style="margin-top:14px;">
        <div id="chain-timeline"></div>
      </div>

      <details id="chain-artifacts" class="section-collapse" style="display:none;margin-top:16px;">
        <summary>ARTIFACTS</summary>
        <div id="chain-artifacts-list"></div>
      </details>
      <details id="chain-final-output-collapse" class="section-collapse" style="display:none;margin-top:16px;">
        <summary>RAW FINAL OUTPUT</summary>
        <pre id="chain-output-pre" class="output-pre"></pre>
      </details>
      <div id="chain-right-hint" class="hint">
        Run a chain job to see output here.
      </div>
    </div>

  </div>

  <!-- Run-time variables dialog -->
  <dialog id="run-vars-dialog">
    <form method="dialog">
      <h3 style="margin:0 0 12px;font-size:0.9rem;color:#aaa;">Run with variables</h3>
      <div id="run-vars-fields"></div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px;">
        <button value="cancel" class="secondary" type="submit">Cancel</button>
        <button value="run" type="submit">Run</button>
      </div>
    </form>
  </dialog>

  <script src="/js/nav.js"></script>
  <script src="/js/profiles-widget.js"></script>
  <script src="/js/peer-status-widget.js"></script>
  <script src="/js/prompt-tokens.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/escape.js"></script>
  <script src="/js/poll.js"></script>
  <script src="/js/toast.js"></script>
  <script src="/js/output-console.js"></script>
  <script src="timeline.js"></script>
  <script src="chain.js"></script>
  <script src="/js/nav-mobile.js"></script>
</body>
</html>
