<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chain Jobs · AI Job Server</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: monospace; background: #111; color: #ccc; overflow: hidden; }

    /* ── Forms ── */
    label { display: block; color: #777; font-size: 0.76rem; margin-bottom: 3px; margin-top: 10px; }
    input, textarea, select {
      width: 100%; padding: 6px 8px; background: #181818; border: 1px solid #2e2e2e;
      color: #ccc; font-family: monospace; font-size: 0.82rem; border-radius: 3px;
    }
    input:focus, textarea:focus, select:focus { outline: none; border-color: #4a4a4a; }
    textarea { resize: vertical; min-height: 54px; }
    button {
      padding: 7px 18px; background: #2a6; color: #fff; border: none;
      border-radius: 3px; cursor: pointer; font-family: monospace; font-size: 0.82rem; margin-top: 10px;
    }
    button:hover { background: #3b7; }
    button.secondary { background: #333; }
    button.secondary:hover { background: #424242; }
    button.danger { background: #7a2222; }
    button.danger:hover { background: #992828; }
    button[disabled] { opacity: 0.38; cursor: not-allowed; background: #2a2a2a; }
    .row { display: flex; gap: 10px; }
    .row > * { flex: 1; min-width: 0; }
    .msg { font-size: 0.76rem; min-height: 1.1em; margin-top: 6px; }
    .status-queued  { color: #777; }
    .status-running { color: #fa0; }
    .status-done    { color: #2a6; }
    .status-failed, .status-error { color: #e44; }
    details > summary { cursor: pointer; color: #555; font-size: 0.76rem; user-select: none; list-style: none; }
    details > summary::-webkit-details-marker { display: none; }
    details > summary::before { content: '▸ '; }
    details[open] > summary::before { content: '▾ '; }

    /* ── Topbar ── */
    #topbar {
      position: fixed; top: 0; left: 0; right: 0; height: 44px;
      display: flex; align-items: center; padding: 0 20px; gap: 14px;
      background: #111; border-bottom: 1px solid #1a1a1a; z-index: 100;
    }
    #topbar a { color: #444; text-decoration: none; font-size: 0.72rem; letter-spacing: 0.06em; transition: color 0.15s; }
    #topbar a:hover { color: #888; }
    .page-title { color: #2a6; font-size: 0.9rem; font-weight: 700; letter-spacing: 0.06em; flex: 1; }
    #jobs-btn { font-size: 0.65rem; color: #444; cursor: pointer; letter-spacing: 0.14em; text-transform: uppercase; transition: color 0.18s; }
    #jobs-btn:hover { color: #888; }

    /* ── Panels ── */
    #panels { display: flex; height: 100vh; padding-top: 44px; }
    #panel-left  { flex: 1; overflow-y: auto; padding: 24px 28px; border-right: 1px solid #1a1a1a; }
    #panel-right { flex: 1; overflow-y: auto; padding: 24px 28px; }

    /* ── Jobs drawer ── */
    #jobs-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.6); z-index: 150; backdrop-filter: blur(4px);
    }
    #jobs-drawer {
      position: fixed; top: 0; right: 0; height: 100vh; width: min(500px, 96vw);
      background: #131313; border-left: 1px solid #222;
      transform: translateX(100%);
      transition: transform 0.36s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 200; overflow-y: auto; padding: 20px 22px;
    }
    #jobs-drawer.open { transform: translateX(0); }
    #jobs-drawer-head { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
    #jobs-drawer-head h2 { flex: 1; color: #555; font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; }
    #jobs-drawer-head button { margin-top: 0; padding: 4px 10px; font-size: 0.72rem; }
    #jobs-table { width: 100%; border-collapse: collapse; font-size: 0.74rem; }
    #jobs-table th { text-align: left; color: #484848; padding: 3px 6px; border-bottom: 1px solid #222; }
    #jobs-table td { padding: 4px 6px; border-bottom: 1px solid #1a1a1a; }
    #jobs-table tr:hover td { background: #1a1a1a; cursor: pointer; }
    #jobs-pagination { display: flex; align-items: center; gap: 8px; padding: 8px 4px; font-size: 0.72rem; color: #555; }
    #jobs-pagination button { padding: 3px 10px; font-size: 0.72rem; }
    #jobs-pagination .page-info { flex: 1; text-align: center; }
    #detail { margin-top: 18px; }
    #detail h3 { color: #484848; font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
    #detail pre { background: #181818; padding: 10px; border-radius: 3px; overflow-x: auto; font-size: 0.71rem; color: #999; }
    #detail-files { margin-top: 8px; font-size: 0.74rem; }
    #detail-files a { color: #446; margin-right: 10px; }

    /* ── Chain-specific ── */
    .chain-step-card {
      border: 1px solid #222; border-radius: 3px; padding: 10px 12px; margin-bottom: 8px; background: #111;
    }
    .chain-step-head {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px;
    }
    .chain-step-head span { color: #484848; font-size: 0.72rem; }
    .chain-step-head button { margin-top: 0; padding: 2px 8px; font-size: 0.7rem; }
    .section-label { color: #383838; font-size: 0.66rem; letter-spacing: 0.12em; text-transform: uppercase; }
    .output-pre {
      background: #0e0e0e; padding: 14px; border-radius: 3px; margin-top: 8px;
      font-size: 0.75rem; color: #bbb; white-space: pre-wrap; word-break: break-word;
      border: 1px solid #1e1e1e;
    }

    /* ── Step collapse sections (output panel) ── */
    .step-collapse { border: 1px solid #1e1e1e; border-radius: 3px; margin-bottom: 6px; background: #0f0f0f; }
    .step-collapse > summary {
      padding: 7px 10px; display: flex; align-items: baseline; gap: 8px;
      cursor: pointer; user-select: none; list-style: none;
    }
    .step-collapse > summary::-webkit-details-marker { display: none; }
    .step-collapse > summary::before { content: '▸ '; color: #444; font-size: 0.72rem; }
    .step-collapse[open] > summary::before { content: '▾ '; }
    .step-num { color: #555; font-size: 0.72rem; white-space: nowrap; }
    .step-sep { color: #2a2a2a; }
    .step-col-name { color: #666; font-size: 0.72rem; flex: 1; }
    .step-collapse-body { padding: 0 10px 10px; }

    /* ── Preset row ── */
    .preset-save-row { display: flex; gap: 8px; margin-top: 6px; align-items: flex-end; }
    .preset-save-row input { flex: 1; }
    .preset-save-row button { flex: 0 0 auto; margin-top: 0; white-space: nowrap; }
  </style>
</head>
<body>

  <div id="topbar">
    <a href="/">&#8592; AI Jobs</a>
    <span class="page-title">Chain Jobs</span>
    <div id="jobs-btn" onclick="openJobsDrawer()">Jobs</div>
  </div>

  <div id="jobs-overlay" onclick="closeJobsDrawer()"></div>
  <div id="jobs-drawer">
    <div id="jobs-drawer-head">
      <h2>Jobs</h2>
      <button class="secondary" onclick="loadJobs()">Refresh</button>
      <button class="danger"    onclick="clearQueue()">Clear Queue</button>
      <button class="secondary" onclick="closeJobsDrawer()">&#10005;</button>
    </div>
    <table id="jobs-table">
      <thead><tr><th>Job ID</th><th>Type</th><th>Status</th><th>Created</th></tr></thead>
      <tbody id="jobs-body"><tr><td colspan="4" style="color:#333;padding:8px;">Loading…</td></tr></tbody>
    </table>
    <div id="jobs-pagination"></div>
    <div id="detail" style="display:none;">
      <h3>Job Detail</h3>
      <div id="detail-content"></div>
      <div id="detail-files"></div>
    </div>
  </div>

  <div id="panels">

    <!-- ── Left: Controls ── -->
    <div id="panel-left">

      <!-- LLM Settings at top, open by default -->
      <details open>
        <summary>LLM Settings</summary>
        <div style="margin-top:10px;">

          <label>Preset</label>
          <select id="chain-preset-select" onchange="applyChainPreset()">
            <option value="">— select preset —</option>
          </select>
          <div class="preset-save-row">
            <input id="chain-preset-name" type="text" placeholder="Preset name…">
            <button class="secondary" onclick="saveChainPreset()">Save preset</button>
          </div>

          <div class="row" style="margin-top:10px;">
            <div>
              <label>API Base URL</label>
              <input id="chain-api-base" type="text" value="http://debian1.local:11434/v1">
            </div>
            <div>
              <label>Model</label>
              <input id="chain-model" type="text" placeholder="gemma4">
            </div>
          </div>
          <div class="row">
            <div>
              <label>Temperature (0–2)</label>
              <input id="chain-temp" type="number" step="0.1" min="0" max="2" value="0.7">
            </div>
            <div>
              <label>Max Tokens</label>
              <input id="chain-max-tokens" type="number" min="1" value="2048">
            </div>
          </div>

        </div>
      </details>

      <label style="margin-top:18px;">Title <span style="color:#383838;font-size:0.7rem;">(optional)</span></label>
      <input id="chain-title" type="text" placeholder="My chain job">

      <label>Initial Input</label>
      <textarea id="chain-input" style="min-height:120px;" placeholder="What should the chain work on?"></textarea>

      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:20px;margin-bottom:8px;">
        <span class="section-label">STEPS</span>
        <button class="secondary" onclick="addChainStep()"
                style="margin-top:0;padding:3px 10px;font-size:0.7rem;">+ Add Step</button>
      </div>
      <div id="chain-steps-list"></div>

      <button onclick="submitChain()" style="margin-top:16px;">Run Chain</button>
    </div>

    <!-- ── Right: Output ── -->
    <div id="panel-right">
      <p class="section-label" style="margin-bottom:14px;">OUTPUT</p>
      <div id="chain-msg" class="msg" style="margin-top:0;"></div>
      <div id="chain-step-status" style="margin-top:14px;"></div>
      <div id="chain-output" style="display:none;margin-top:16px;">
        <p class="section-label" style="margin-bottom:6px;">FINAL OUTPUT</p>
        <pre id="chain-output-pre" class="output-pre"></pre>
      </div>
      <div id="chain-right-hint" style="color:#222;font-size:0.74rem;">
        Run a chain job to see output here.
      </div>
    </div>

  </div>

  <script>
    const FILES = ['status.json','request.json','input.txt','logs.txt','artifacts.json'];

    async function api(path, method = 'GET', body = null) {
      const opts = { method, headers: { 'Content-Type': 'application/json' } };
      if (body) opts.body = JSON.stringify(body);
      const r = await fetch('/v1' + path, opts);
      if (!r.ok) throw new Error(await r.text());
      return r.json();
    }
    function _escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function statusClass(s) { return 'status-' + s; }

    // ── Jobs drawer ─────────────────────────────────────────────────
    function openJobsDrawer() {
      document.getElementById('jobs-overlay').style.display = 'block';
      document.getElementById('jobs-drawer').classList.add('open');
      loadJobs();
    }
    function closeJobsDrawer() {
      document.getElementById('jobs-overlay').style.display = 'none';
      document.getElementById('jobs-drawer').classList.remove('open');
    }
    async function clearQueue() {
      if (!confirm('Delete all queued jobs? This cannot be undone.')) return;
      try {
        const r = await fetch('/v1/jobs', { method: 'DELETE' });
        if (!r.ok) throw new Error(await r.text());
        const data = await r.json();
        alert(`Removed ${data.removed} queued job${data.removed === 1 ? '' : 's'}.`);
        loadJobs();
      } catch(e) { alert('Error: ' + e.message); }
    }

    const JOBS_PAGE_SIZE = 25;
    let _jobsPage = 0, _allJobs = [];

    function _renderJobsPage() {
      const tbody = document.getElementById('jobs-body');
      const pager = document.getElementById('jobs-pagination');
      const totalPages = Math.max(1, Math.ceil(_allJobs.length / JOBS_PAGE_SIZE));
      const start = _jobsPage * JOBS_PAGE_SIZE;
      const page  = _allJobs.slice(start, start + JOBS_PAGE_SIZE);
      if (page.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" style="color:#333;padding:8px;">No jobs yet.</td></tr>';
        pager.innerHTML = ''; return;
      }
      tbody.innerHTML = page.map(j => `
        <tr onclick="loadDetail('${j.job_id}')">
          <td style="color:#555">${j.job_id.slice(0,8)}&hellip;</td>
          <td style="color:#666">${j.job_type}</td>
          <td class="${statusClass(j.status)}">${j.status}</td>
          <td style="color:#555">${new Date(j.created_at).toLocaleString()}</td>
        </tr>`).join('');
      pager.innerHTML = totalPages <= 1 ? '' : `
        <button class="secondary" onclick="_jobsGo(-1)" ${_jobsPage === 0 ? 'disabled' : ''}>&#8592; Prev</button>
        <span class="page-info">${_jobsPage + 1} / ${totalPages}</span>
        <button class="secondary" onclick="_jobsGo(1)" ${_jobsPage >= totalPages - 1 ? 'disabled' : ''}>Next &#8594;</button>`;
    }
    function _jobsGo(delta) {
      const totalPages = Math.ceil(_allJobs.length / JOBS_PAGE_SIZE);
      _jobsPage = Math.max(0, Math.min(_jobsPage + delta, totalPages - 1));
      _renderJobsPage();
    }
    async function loadJobs() {
      const tbody = document.getElementById('jobs-body');
      try {
        const data = await api('/jobs');
        _allJobs = (data.jobs || []).slice().sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
        _jobsPage = 0; _renderJobsPage();
      } catch(e) {
        tbody.innerHTML = `<tr><td colspan="4" style="color:#e44">Error: ${e.message}</td></tr>`;
      }
    }
    async function loadDetail(jobId) {
      const detail  = document.getElementById('detail');
      const content = document.getElementById('detail-content');
      const filesDiv = document.getElementById('detail-files');
      openJobsDrawer();
      detail.style.display = 'block';
      try {
        const job = await api('/jobs/' + jobId);
        content.innerHTML = `<pre>${JSON.stringify(job, null, 2)}</pre>`;
        filesDiv.innerHTML = FILES.map(f =>
          `<a href="/v1/jobs/${jobId}/files/${f}" target="_blank">${f}</a>`
        ).join('');
        detail.scrollIntoView({ behavior: 'smooth', block: 'start' });
      } catch(e) {
        content.innerHTML = `<span style="color:#e44">Error: ${e.message}</span>`;
      }
    }

    // ── Chain Presets ────────────────────────────────────────────────
    const _PRESETS_KEY = 'chain_llm_presets';

    function _loadChainPresets() {
      const sel = document.getElementById('chain-preset-select');
      const presets = JSON.parse(localStorage.getItem(_PRESETS_KEY) || '[]');
      const current = sel.value;
      while (sel.options.length > 1) sel.remove(1);
      for (const p of presets) {
        const opt = document.createElement('option');
        opt.value = p.id;
        opt.textContent = p.name;
        sel.appendChild(opt);
      }
      if (current) sel.value = current;
    }

    function applyChainPreset() {
      const id = document.getElementById('chain-preset-select').value;
      if (!id) return;
      const presets = JSON.parse(localStorage.getItem(_PRESETS_KEY) || '[]');
      const p = presets.find(x => x.id === id);
      if (!p) return;
      document.getElementById('chain-api-base').value   = p.api_base;
      document.getElementById('chain-model').value      = p.model;
      document.getElementById('chain-temp').value       = p.temperature;
      document.getElementById('chain-max-tokens').value = p.max_tokens;
    }

    function saveChainPreset() {
      const name = document.getElementById('chain-preset-name').value.trim();
      if (!name) { alert('Enter a preset name first.'); return; }
      const entry = {
        api_base:    document.getElementById('chain-api-base').value.trim(),
        model:       document.getElementById('chain-model').value.trim(),
        temperature: parseFloat(document.getElementById('chain-temp').value),
        max_tokens:  parseInt(document.getElementById('chain-max-tokens').value),
      };
      const presets = JSON.parse(localStorage.getItem(_PRESETS_KEY) || '[]');
      const existing = presets.find(x => x.name === name);
      if (existing) {
        Object.assign(existing, entry);
      } else {
        const id = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
          const r = Math.random() * 16 | 0;
          return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
        });
        presets.push({ id, name, ...entry });
      }
      localStorage.setItem(_PRESETS_KEY, JSON.stringify(presets));
      _loadChainPresets();
      const saved = JSON.parse(localStorage.getItem(_PRESETS_KEY)).find(x => x.name === name);
      if (saved) document.getElementById('chain-preset-select').value = saved.id;
    }

    // ── Chain ────────────────────────────────────────────────────────
    const _CHAIN_DEFAULT_PROMPT =
      'Using the previous output, continue the task.\n\nPrevious:\n{{previous}}\n\nContext:\n{{context}}';
    let _chainStepCounter  = 0;
    let _chainJobPollTimer = null;

    function addChainStep(name = '', prompt = _CHAIN_DEFAULT_PROMPT, contextFiles = '') {
      const idx = _chainStepCounter++;
      const id  = `chain-step-${idx}`;
      const el  = document.createElement('div');
      el.id = id; el.className = 'chain-step-card';
      el.innerHTML =
        '<div class="chain-step-head">' +
          '<span>Step</span>' +
          '<button class="secondary" onclick="removeChainStep(\'' + id + '\')" ' +
            'style="margin-top:0;padding:2px 8px;font-size:0.7rem;">Remove</button>' +
        '</div>' +
        '<label>Name</label>' +
        '<input type="text" value="' + _escHtml(name) + '" placeholder="e.g. Create outline" class="chain-step-name">' +
        '<label>Prompt</label>' +
        '<textarea class="chain-step-prompt" style="min-height:72px;">' + _escHtml(prompt) + '</textarea>' +
        '<label>Context Files <span style="color:#383838;font-size:0.7rem;">(one relative path per line)</span></label>' +
        '<textarea class="chain-step-context" style="min-height:34px;">' + _escHtml(contextFiles) + '</textarea>';
      document.getElementById('chain-steps-list').appendChild(el);
    }

    function removeChainStep(id) {
      const el = document.getElementById(id);
      if (el) el.remove();
    }

    async function submitChain() {
      const msg           = document.getElementById('chain-msg');
      const stepStatusDiv = document.getElementById('chain-step-status');
      const outputDiv     = document.getElementById('chain-output');
      const hint          = document.getElementById('chain-right-hint');
      msg.textContent = ''; stepStatusDiv.innerHTML = ''; outputDiv.style.display = 'none';

      const stepEls = document.querySelectorAll('#chain-steps-list > .chain-step-card');
      const steps = [];
      for (const el of stepEls) {
        const name   = el.querySelector('.chain-step-name').value.trim() || 'Step';
        const prompt = el.querySelector('.chain-step-prompt').value;
        const ctxRaw = el.querySelector('.chain-step-context').value.trim();
        const context_files = ctxRaw ? ctxRaw.split('\n').map(s => s.trim()).filter(Boolean) : [];
        steps.push({ name, type: 'llm', prompt, context_files });
      }
      if (steps.length === 0) {
        msg.style.color = '#e44'; msg.textContent = 'Add at least one step.'; return;
      }

      const body = {
        input: document.getElementById('chain-input').value,
        llm: {
          api_base:    document.getElementById('chain-api-base').value.trim(),
          model:       document.getElementById('chain-model').value.trim(),
          temperature: parseFloat(document.getElementById('chain-temp').value),
          max_tokens:  parseInt(document.getElementById('chain-max-tokens').value),
        },
        steps,
      };
      const title = document.getElementById('chain-title').value.trim();
      if (title) body.title = title;

      try {
        hint.style.display = 'none';
        const job = await api('/jobs/chain', 'POST', body);
        msg.style.color = '#fa0';
        msg.textContent = 'Job ' + job.job_id.slice(0, 8) + '… running';
        if (_chainJobPollTimer) clearInterval(_chainJobPollTimer);
        _chainJobPollTimer = setInterval(() => _pollChainJob(job.job_id), 3000);
      } catch (e) {
        msg.style.color = '#e44'; msg.textContent = 'Error: ' + e.message;
      }
    }

    function _stepCollapseHtml(step, stepIndex, promptText, outputText) {
      const cls = step.status === 'error' ? 'status-failed' : statusClass(step.status);
      let bodyHtml = '';
      if (promptText != null) {
        bodyHtml += '<p class="section-label" style="margin:10px 0 4px;">PROMPT</p>' +
          '<pre class="output-pre">' + _escHtml(promptText) + '</pre>';
      }
      if (outputText != null) {
        bodyHtml += '<p class="section-label" style="margin:10px 0 4px;">OUTPUT</p>' +
          '<pre class="output-pre">' + _escHtml(outputText) + '</pre>';
      } else if (step.error) {
        bodyHtml += '<p class="section-label" style="margin:10px 0 4px;">ERROR</p>' +
          '<pre class="output-pre status-failed">' + _escHtml(step.error) + '</pre>';
      }
      return '<details class="step-collapse">' +
        '<summary>' +
          '<span class="step-num">Step ' + stepIndex + '</span>' +
          '<span class="step-sep">·</span>' +
          '<span class="step-col-name">' + _escHtml(step.name) + '</span>' +
          '<span class="' + cls + '">' + step.status + '</span>' +
        '</summary>' +
        '<div class="step-collapse-body">' + bodyHtml + '</div>' +
        '</details>';
    }

    async function _fetchStepFiles(jobId, step, arrayIndex) {
      const dirName = String(arrayIndex + 1).padStart(3, '0') + '_' + step.id;
      const base = '/v1/jobs/' + jobId + '/files/steps/' + dirName + '/';
      const [pr, or] = await Promise.allSettled([
        fetch(base + 'prompt.txt'),
        fetch(base + 'output.txt'),
      ]);
      const promptText = pr.status === 'fulfilled' && pr.value.ok ? await pr.value.text() : null;
      const outputText = or.status === 'fulfilled' && or.value.ok ? await or.value.text() : null;
      return { promptText, outputText };
    }

    async function _pollChainJob(jobId) {
      try {
        const msg           = document.getElementById('chain-msg');
        const stepStatusDiv = document.getElementById('chain-step-status');
        const outputDiv     = document.getElementById('chain-output');

        const r = await fetch('/v1/jobs/' + jobId + '/files/status.json');
        if (!r.ok) return;
        const job = await r.json();

        if (job.status === 'done') {
          clearInterval(_chainJobPollTimer); _chainJobPollTimer = null;
          msg.style.color = '#2a6'; msg.textContent = 'Done.';

          try {
            const sr = await fetch('/v1/jobs/' + jobId + '/steps');
            if (sr.ok) {
              const sd = await sr.json();
              const steps = sd.steps || [];
              // Fetch files for all intermediate (non-final) steps in parallel
              const intermediateSteps = steps.slice(0, -1);
              const fileResults = await Promise.allSettled(
                intermediateSteps.map((step, i) => _fetchStepFiles(jobId, step, i))
              );
              stepStatusDiv.innerHTML = intermediateSteps.map((step, i) => {
                const files = fileResults[i].status === 'fulfilled' ? fileResults[i].value : {};
                return _stepCollapseHtml(step, i + 1, files.promptText ?? null, files.outputText ?? null);
              }).join('');
            }
          } catch (e) {}

          try {
            const or = await fetch('/v1/jobs/' + jobId + '/files/final_output.txt');
            if (or.ok) {
              document.getElementById('chain-output-pre').textContent = await or.text();
              outputDiv.style.display = 'block';
            }
          } catch (e) {}

        } else if (job.status === 'error') {
          clearInterval(_chainJobPollTimer); _chainJobPollTimer = null;
          msg.style.color = '#e44';
          msg.textContent = 'Error: ' + (job.error || 'unknown');

          try {
            const sr = await fetch('/v1/jobs/' + jobId + '/steps');
            if (sr.ok) {
              const sd = await sr.json();
              const steps = sd.steps || [];
              // Show all steps that ran (no final output to display separately)
              const fileResults = await Promise.allSettled(
                steps.map((step, i) => _fetchStepFiles(jobId, step, i))
              );
              stepStatusDiv.innerHTML = steps.map((step, i) => {
                const files = fileResults[i].status === 'fulfilled' ? fileResults[i].value : {};
                return _stepCollapseHtml(step, i + 1, files.promptText ?? null, files.outputText ?? null);
              }).join('');
            }
          } catch (e) {}

        } else {
          const stepInfo = job.current_step_name
            ? ' · step ' + job.current_step_index + '/' + job.step_count + ': ' + job.current_step_name
            : '';
          msg.textContent = 'Job ' + jobId.slice(0, 8) + '… ' + job.status + stepInfo;
        }
      } catch (e) {}
    }

    // ── Init ─────────────────────────────────────────────────────────
    _loadChainPresets();
    addChainStep('Create outline', 'Create five bullet points for the following task.\n\nInput:\n{{input}}', '');
  </script>
</body>
</html>
